# Dotter package manifest — the single source of truth for "what file goes where".
#
# One `[<package>.files]` section per tool, alphabetical. Keys are paths relative
# to the repo root; values are the deployed target. Symlinks are the default
# (see [settings]), so a bare `"src" = "~/target"` is all most packages need.
# Use the long form `{ target = "...", type = "symbolic", recurse = false }`
# only when you need to override recursion for a directory or bundle.
#
# To turn a package on for this machine, add its name to `packages` in
# dotter/local.toml — or run `setup/macos/packages.sh enable <name>`.
#
# Tracked under `config/` but deliberately not wired up here (source-only):
#   beatportdl, compressor, git, homebrew, iterm, ollama, python, tag-media

[settings]
default_target_type = "symbolic"

[helpers]

# --- Shell and prompt ---------------------------------------------------------

[zsh.files]
"config/zsh/zshrc.zsh" = "~/.zshrc"
"config/zsh/zshenv.zsh" = "~/.zshenv"
"config/zsh/zprofile.zsh" = "~/.zprofile"
"config/zsh/zlogin.zsh" = "~/.zlogin"
"config/zsh/zlogout.zsh" = "~/.zlogout"
"config/zsh/emoji.json" = "~/.zsh/emoji.json"
"config/zsh/completions" = "~/.zsh/completions"
"config/zsh/autoload" = "~/.zsh/autoload"
"config/zsh/bin" = "~/.zsh/bin"

[bash.files]
"config/bash/rc.bash" = "~/.bashrc"
"config/bash/fzm.bash" = "~/.bash/fzm.bash"

[bin.files]
"bin" = { target = "~/.bin/", type = "symbolic" }

[starship.files]
"config/starship/starship.toml" = "~/.config/starship.toml"

# --- Terminals ----------------------------------------------------------------

[alacritty.files]
"config/alacritty/alacritty.toml" = "~/.config/alacritty/alacritty.toml"

[kitty.files]
