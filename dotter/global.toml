[helpers]

[settings]
default_target_type = "symbolic"

[default]
depends = []

[delta.files]
"config/dev/delta/gitconfig" = "~/.gitconfig"

[dprint.files]
"config/apps/dprint" = "~/.config/dprint"

[default.files]

[default.variables]
"colorscheme" = "zellner"
"zk_path" = "/mnt/data/notes/zk"

[bin.files]
"bin" = { target = "~/.bin/", type = "symbolic" }

[karabiner.files]
"config/apps/karabiner" = "~/.config/karabiner"

[karabiner_m3.files]
"config/apps/karabiner-m3" = "~/.config/karabiner"

[karabiner_m4.files]
"config/apps/karabiner-m4" = "~/.config/karabiner"

[switch.files]
"config/media/switch" = "~/.switch"

[rclone.files]
"config/apps/rclone" = "~/.config/rclone"

[hammerspoon.files]
"config/windowing/hammerspoon" = "~/.hammerspoon"

[joshuto.files]
"config/navigation/joshuto" = "~/.config/joshuto"

[yazi.files]
"config/apps/yazi" = { target = "~/.config/yazi", type = "symbolic" }

[chafa.files]
"scripts/chafa-select" = "~/.bin/chafa-select"

[zellij.files]
"config/terminals/zellij" = { target = "~/.config/zellij", type = "symbolic" }

[mpv.files]
"config/media/mpv" = "~/.config/mpv"

[alacritty]
files = { "config/terminals/alacritty/alacritty.toml" = "~/.config/alacritty/alacritty.toml" }

[kitty.files]
"config/terminals/kitty" = "~/.config/kitty"

[nu]
files = { "config/shell/nu" = "~/.config/nushell" }

[skhd]
files = { "config/windowing/skhd/skhd.conf" = "~/.config/skhd/skhdrc" }

[bash]
files = { "config/shell/bash/rc.bash" = "~/.bashrc", "config/shell/bash/fzm.bash" = "~/.bash/fzm.bash" }

[sway]
[sway.files]
"config/windowing/sway/sway.conf" = "~/.config/sway/config"
"config/windowing/yambar/yambar.yml" = "~/.config/yambar/config.yml"
"config/windowing/waybar" = "~/.config/waybar"

[nvim]
# Dormant package kept for source retention; not selected by active machine profiles.
files = { "config/editors/neovim" = "~/.config/nvim" }
#files = { "neovim.lua" = "~/.config/nvim/init.lua", "snippets" = "~/.config/nvim/snippets" }
# variables = { "colorscheme" = "darkblue" }

[foot]
files = { "config/terminals/foot/foot.ini" = "~/.config/foot/foot.ini" }

[xdg]
files = { "config/system/xdg-applications" = "~/.local/share/applications" }

[helix]
files = { "config/editors/helix" = "~/.config/helix" }

[starship]
files = { "config/shell/starship/starship.toml" = "~/.config/starship.toml" }

[yt-dlp.files]
"config/apps/yt-dlp" = "~/.config/yt-dlp/"
# "apps/yt-dlp/" = "~/.config/yt-dlp/plugins/sites/yt_dlp_plugins/extractorplugins/mysites/yt_dlp_plugins/extractor"

[lf]
[lf.files]
"config/navigation/lf/lfrc.conf" = { target = "~/.config/lf/lfrc", type = "symbolic" }
"config/navigation/lf/pv.sh" = "~/.config/lf/pv.sh"
"config/navigation/lf/icons" = "~/.config/lf/icons"
"config/navigation/lf/colors" = "~/.config/lf/colors"

[zsh]
[zsh.files]
"config/shell/zsh/zshrc.zsh" = "~/.zshrc"
"config/shell/zsh/zshenv.zsh" = "~/.zshenv"
"config/shell/zsh/zprofile.zsh" = "~/.zprofile"
"config/shell/zsh/zlogin.zsh" = "~/.zlogin"
"config/shell/zsh/zlogout.zsh" = "~/.zlogout"
"config/shell/zsh/emoji.json" = "~/.zsh/emoji.json"
"config/shell/zsh/completions" = "~/.zsh/completions"
"config/shell/zsh/autoload" = "~/.zsh/autoload"
"config/shell/zsh/bin" = "~/.zsh/bin"

[dotter]
files = { "dotter/global.toml" = "~/.config/dotter/global.toml" }

[gitui]
files = { "config/dev/gitui/vim.ron" = "~/.config/gitui/key_bindings.ron" }

[marta.files]
"config/apps/marta/conf.marco" = "~/Library/Application Support/org.yanex.marta/conf.marco"
"config/apps/marta/favorites.marco" = "~/Library/Application Support/org.yanex.marta/favorites.marco"
