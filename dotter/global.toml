"config/marta/favorites.marco" = "~/Library/Application Support/org.yanex.marta/favorites.marco"
"config/marta/Themes/Black.theme" = "~/Library/Application Support/org.yanex.marta/Themes/Black.theme"

[open-in-forklift.files]
