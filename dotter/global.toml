"config/kitty/kittens/toggle_repl.py" = "~/.config/kitty/kittens/toggle_repl.py"
"config/kitty/kitty.conf" = "~/.config/kitty/kitty.conf"
"config/kitty/tab_bar.py" = "~/.config/kitty/tab_bar.py"
"config/kitty/themes/1984-dark" = "~/.config/kitty/themes/1984-dark"

[tmux.files]
"config/tmux/tmux.conf" = "~/.tmux.conf"

[zellij.files]
"config/zellij" = { target = "~/.config/zellij", type = "symbolic" }

# --- Editors and viewers ------------------------------------------------------

[helix.files]
"config/helix" = "~/.config/helix"

[leaf.files]
"config/leaf/config.toml" = "~/.config/leaf/config.toml"

[micro.files]
"config/micro" = "~/.config/micro"

# Dormant source retention; not selected by active machine profiles.
[nvim.files]
"config/neovim" = "~/.config/nvim"

# --- File managers ------------------------------------------------------------

[broot.files]
"config/broot" = "~/.config/broot"

[lsd.files]
