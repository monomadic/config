[helpers]

[settings]
default_target_type = "symbolic"

[default]
depends = []

[delta.files]
"config/delta/gitconfig" = "~/.gitconfig"

[dprint.files]
"config/dprint" = "~/.config/dprint"

[default.files]

[default.variables]
"colorscheme" = "zellner"
"zk_path" = "/mnt/data/notes/zk"

[bin.files]
"bin" = { target = "~/.bin/", type = "symbolic" }

[karabiner.files]
"config/karabiner/assets" = { target = "~/.config/karabiner/assets", type = "symbolic" }
"config/karabiner/karabiner.json" = { target = "~/.config/karabiner/karabiner.json", type = "template" }

[switch.files]
"config/switch" = "~/.switch"

[rclone.files]
"config/rclone" = "~/.config/rclone"

[hammerspoon.files]
"config/hammerspoon" = "~/.hammerspoon"

[broot.files]
"config/broot" = "~/.config/broot"

[cointop.files]
"config/cointop/config.toml" = "~/.config/cointop/config.toml"

[fuzzel.files]
"config/fuzzel/fuzzel.ini" = "~/.config/fuzzel/fuzzel.ini"

[gomu.files]
"config/gomu/gomu.conf" = "~/.config/gomu/gomu.conf"

[joshuto.files]
"config/joshuto" = "~/.config/joshuto"

[i3.files]
"config/i3/i3.conf" = "~/.config/i3/config"

[yazi.files]
"config/yazi" = { target = "~/.config/yazi", type = "symbolic" }

[micro.files]
"config/micro" = "~/.config/micro"

[onagre.files]
"config/onagre" = "~/.config/onagre"

[chafa.files]
"scripts/chafa-select" = "~/.bin/chafa-select"

[zellij.files]
"config/zellij" = { target = "~/.config/zellij", type = "symbolic" }

[mpv.files]
"config/mpv" = "~/.config/mpv"

[alacritty]
files = { "config/alacritty/alacritty.toml" = "~/.config/alacritty/alacritty.toml" }

[kitty.files]
"config/kitty" = "~/.config/kitty"

[skhd]
files = { "config/skhd/skhd.conf" = "~/.config/skhd/skhdrc" }

[bash]
files = { "config/bash/rc.bash" = "~/.bashrc", "config/bash/fzm.bash" = "~/.bash/fzm.bash" }

[sway]
[sway.files]
"config/sway/sway.conf" = "~/.config/sway/config"
"config/yambar/yambar.yml" = "~/.config/yambar/config.yml"
"config/waybar" = "~/.config/waybar"

[nvim]
# Dormant package kept for source retention; not selected by active machine profiles.
files = { "config/neovim" = "~/.config/nvim" }

[foot]
files = { "config/foot/foot.ini" = "~/.config/foot/foot.ini" }

[tmux.files]
"config/tmux/tmux.conf" = "~/.tmux.conf"

[xdg]
files = { "config/xdg-applications" = "~/.local/share/applications" }

[helix]
files = { "config/helix" = "~/.config/helix" }

[starship]
files = { "config/starship/starship.toml" = "~/.config/starship.toml" }

[yt-dlp.files]
"config/yt-dlp" = "~/.config/yt-dlp/"
# "config/yt-dlp/" = "~/.config/yt_dlp/plugins/sites/yt_dlp_plugins/extractorplugins/mysites/yt_dlp_plugins/extractor"


[lf]
[lf.files]
"config/lf/lfrc.conf" = { target = "~/.config/lf/lfrc", type = "symbolic" }
"config/lf/pv.sh" = "~/.config/lf/pv.sh"
"config/lf/icons" = "~/.config/lf/icons"
"config/lf/colors" = "~/.config/lf/colors"

[zsh]
[zsh.files]
"config/zsh/zshrc.zsh" = "~/.zshrc"
"config/zsh/zshenv.zsh" = "~/.zshenv"
"config/zsh/zprofile.zsh" = "~/.zprofile"
"config/zsh/zlogin.zsh" = "~/.zlogin"
"config/zsh/zlogout.zsh" = "~/.zlogout"
"config/zsh/emoji.json" = "~/.zsh/emoji.json"
"config/zsh/completions" = "~/.zsh/completions"
"config/zsh/autoload" = "~/.zsh/autoload"
"config/zsh/bin" = "~/.zsh/bin"

[dotter]
files = { "dotter/global.toml" = "~/.config/dotter/global.toml" }

[gitui]
files = { "config/gitui/vim.ron" = "~/.config/gitui/key_bindings.ron" }

[marta.files]
"config/marta/conf.marco" = "~/Library/Application Support/org.yanex.marta/conf.marco"
"config/marta/favorites.marco" = "~/Library/Application Support/org.yanex.marta/favorites.marco"
"config/marta/Themes/Black.theme" = "~/Library/Application Support/org.yanex.marta/Themes/Black.theme"
