##### IINA DEFAULTS (fast browsing) #####

# Start from mpv's built-in low-overhead profile, matching mpv.conf's browsing
# bias while leaving IINA in charge of its own window/renderer integration.
profile=fast

# Window / sizing
geometry=50%:50%
autofit-larger=90%x90%

# Decoding
# IINA is more conservative around hwdec/renderer ownership than standalone mpv.
hwdec=auto-safe
hwdec-codecs=all
vd-lavc-dr=yes
video-sync=audio

# Rendering
# IINA owns the libmpv render context. Do not force standalone vo/gpu-api here.
#vo=gpu-next
#gpu-api=next

# Keep interpolation opt-in. It is nice, but expensive for fast browsing.
interpolation=no
tscale=oversample
tscale-window=quadric
tscale-radius=1.0

# Conservative scalers: less GPU work, still clean enough for browsing clips.
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no

# Cache / demux defaults. Match the leaner mpv defaults so startup and random
# jumping stay responsive on large/high-bitrate files.
cache=yes
cache-secs=15
demuxer-max-bytes=256MiB
demuxer-max-back-bytes=64MiB
demuxer-readahead-secs=10

# Avoid scanning big directories for sidecar files on every open.
sub-auto=no
audio-file-auto=no
cover-art-auto=no

# Playback behavior
fullscreen=yes
# Keep IINA's non-native fullscreen behavior; native-fs is for standalone mpv.
native-fs=no
loop-playlist=inf
force-window=immediate
mute=yes

directory-mode=recursive

# OSD
# IINA supplies its own controls, so keep the standalone mpv OSC quiet.
osc=no
osd-level=0
osd-font="JetBrainsMono Nerd Font Mono"
osd-font-size=14
osd-bold=yes
osd-color="#FFFFFF"
osd-scale-by-window=yes
osd-border-size=1.0
osd-border-color="#00000080"
osd-shadow-offset=0.5
osd-shadow-color="#00000060"
osd-margin-x=20
osd-bar-align-y=0
osd-bar-align-x=0
osd-bar-w=60
osd-bar-h=2
osd-border-style=background-box
osd-back-color="#A0000000"
osd-spacing=0.0
osd-on-seek=bar
osd-duration=3000
osd-margin-y=0

osd-playing-msg=""

# Audio settings
#audio-pitch-correction=no  # Uncomment if desired

# Subtitles
slang=en

# Optional IPC for scripts (uncomment if using scripts/remote control)
#input-ipc-server=/tmp/mpv-socket
