# Lightweight hover previews via scripts/thumbfast.lua.
# Keep generation on-demand so random seeking and short-clip browsing stay snappy.

# Enabled by default for normal playback. The vj profile turns this off, and
# vj-thumbs opts back in when previews are explicitly wanted there.
enabled=yes

# Auto temp files/socket. Override only if mpv cannot create them.
socket=
thumbnail=

# 16:9 previews, center-cropped by scripts/thumbfast.lua to avoid letterboxing.
max_width=360
max_height=203
scale_factor=1

# Match the active video tone mapping when needed.
tone_mapping=auto

# Avoid background work on file load; quit the worker shortly after hover stops.
spawn_first=no
quit_after_inactivity=8

# Local video only. Remote/audio previews tend to be slow or surprising.
network=no
audio=no

# Software decode keeps the thumbnail subprocess predictable on macOS.
hwdec=no

# Homebrew mpv is present on this machine.
mpv_path=/opt/homebrew/bin/mpv
