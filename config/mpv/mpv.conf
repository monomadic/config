##### GLOBAL DEFAULTS (fast playback) #####

# Start from mpv's built-in low-overhead profile, then keep the local defaults
# biased toward fast startup and smooth high-resolution playback.
profile=fast

# Window / sizing
geometry=50%:50%
autofit-larger=90%x90%

# Decoding
hwdec=auto-unsafe
hwdec-codecs=all
vd-lavc-dr=yes
video-sync=audio

# Rendering
vo=gpu-next

# Keep interpolation opt-in. It is beautiful, but expensive on 4K/60 media.
interpolation=no
tscale=oversample
tscale-window=quadric
tscale-radius=1.0

# Conservative scalers: less GPU work, still clean enough for browsing clips.
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no

# Cache / demux defaults. Huge readahead makes next-file playback nicer, but can
# make startup and random jumping feel sticky on large/high-bitrate files.
cache=yes
cache-secs=15
demuxer-max-bytes=256MiB
demuxer-max-back-bytes=64MiB
demuxer-readahead-secs=10

# Avoid scanning big directories for sidecar files on every open.
sub-auto=no
audio-file-auto=no
cover-art-auto=no

# Playback behavior (normal)
fullscreen=yes
native-fs=yes
loop-playlist=inf
force-window=immediate
mute=yes

# MacOS specific
border=no

directory-mode=recursive
#autocreate-playlist=same

# OSD
# scripts/osc.lua is the vanilla OSC with thumbfast hover-preview support.
osc=yes
# Keep the OSC cheap: no fade animation, and redraw the Lua/ASS overlay at
# 10 Hz while visible instead of the vanilla ~33 Hz.
script-opts=osc-layout=bottombar,osc-visibility=auto,osc-fadeduration=0,osc-tickdelay=0.10
osd-level=0
osd-font="JetBrainsMono Nerd Font Mono"
osd-font-size=14
osd-bold=yes
osd-color="#FFFFFF"
osd-scale-by-window=yes
osd-border-size=1.0
osd-border-color="#00000080"
osd-shadow-offset=0.5
osd-shadow-color="#00000060"
osd-margin-x=20
osd-bar-align-y=0
osd-bar-align-x=0
osd-bar-w=60
osd-bar-h=2
osd-border-style=background-box
osd-back-color="#A0000000"
osd-spacing=0.0
osd-on-seek=bar
osd-duration=3000
osd-margin-y=0

osd-playing-msg=""

# Subtitles
slang=en

# IPC socket
input-ipc-server=/tmp/mpv-socket


##### VJ PROFILE #####
[vj]
# Super-fast tiny-clip profile: minimal sync/rendering work, no audio/subtitle
# decode, and enough cache for quick next-file starts without huge readahead.
profile=fast

# Windowing
fullscreen=yes
native-fs=yes
force-window=immediate
loop-playlist=inf

# Audio: completely off (cheaper than just mute)
audio=no
mute=yes

# OSD completely off for clean output. The local OSC is a script, so hide it
# via its own option too; this also keeps it from requesting thumbfast previews.
osc=no
script-opts-append=osc-visibility=never
osd-level=0
osd-bar-align-y=0

# Keep thumbnailing out of the VJ hot path. thumbfast exits before installing
# observers, and the legacy thumbnail script avoids background cache generation
# if it is present.
script-opts-append=thumbfast-enabled=no
script-opts-append=mpv_thumbnail_script-autogenerate=no

# No interpolation or display-resample for lower latency / less overhead
interpolation=no
video-sync=audio
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no

# Lean cache for small clips and fast random access.
cache=yes
cache-secs=10
demuxer-max-bytes=128MiB
demuxer-max-back-bytes=32MiB
demuxer-readahead-secs=10

# Prefetch next playlist item
prefetch-playlist=yes

# Don’t bother with subs
sub=no
sid=no
sub-auto=no
audio-file-auto=no
cover-art-auto=no


##### VJ THUMBNAILS PROFILE #####
[vj-thumbs]
# Explicit opt-in when you want the VJ profile with seekbar previews available.
profile=vj
osc=yes
script-opts-append=osc-visibility=auto
script-opts-append=thumbfast-enabled=yes
script-opts-append=mpv_thumbnail_script-autogenerate=yes


##### A/B COMPARE PROFILE #####
[ab]
# Opt-in two-video comparison mode:
#   mpv --profile=ab /path/to/A.mp4 /path/to/B.mp4
# or:
#   mpv --profile=ab --external-file=/path/to/B.mp4 /path/to/A.mp4
#
# This inherits the lean VJ settings, then skips the normal user script stack
# and loads just the A/B helper script.
profile=vj
load-scripts=no
script=~~/optional-scripts/ab-compare.lua
osc=yes
script-opts-append=osc-visibility=always
osd-level=1
osd-duration=3000


##### QUALITY PROFILE #####
[quality]
# Opt in when you want nicer motion/scaling and do not mind extra GPU work.
profile=fast
osc=yes
video-sync=display-resample
interpolation=yes
tscale=mitchell
tscale-window=quadric
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
demuxer-readahead-secs=60


##### MINIMAL PROFILE #####
[minimal]
# Useful for isolating script/config regressions without giving up all options.
load-scripts=no
osc=no
osd-level=0
sub=no
sid=no
audio-file-auto=no
sub-auto=no
cover-art-auto=no
interpolation=no
video-sync=audio
cache=yes
demuxer-max-bytes=128MiB
demuxer-max-back-bytes=32MiB
demuxer-readahead-secs=5
