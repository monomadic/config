# https://github.com/mpv-player/mpv/blob/master/etc/input.conf

# Shuffle the playlist
s playlist-shuffle ; show-text "Shuffled ${playlist-count} items" 1000 1

Meta+d script-binding replace-playlist
Meta+o script-binding load-all-media
Meta+c script-binding copy-current-path

j script-binding smart_playlist_nav/random_seek_within_file

# Edit with losslesscut
Meta+t run /Applications/LosslessCut.app/Contents/MacOS/LosslessCut "%{path}"

# Interpolation toggle
# i cycle interpolation
# V cycle-values osd-msg3 "${path}\n${width}x${height} ${video-bitrate} ${video-codec} @ ${fps}fps\n${file-size}" ""
Ctrl+I script-message toggle-interpolation

# Trim current video with fzf keyframe selector
t script-binding trim_current_file
Ctrl+t script-binding trim_current_file
z script-binding topaz_workflow_current_file

# Set star rating on the current file (rating stored in filename)
* script-binding set_rating_current_file

# / show-text "${metadata/title:}\n${?gt(width,height):${width}:${height}}p @ ${estimated-vf-fps}fps\n${file-size}${?video-bitrate: [${video-bitrate}]}" 5000 1

#/ show-text "${metadata/title:}\n${!add(gt(width,height),gt(height,width)):${width:0}:${height:0}}p @ ${estimated-vf-fps}fps\n${file-size}${?video-bitrate: [${video-bitrate}]}" 5000 1
# SHIFT+/ show shortcut help
SHIFT+? show-text "[?:HELP   /:INFO   R:RANDOMIZE]"

# Random clip
SHIFT+Enter script-binding smart_playlist_nav/playlist-random-track

l seek 5 relative-percent
Shift+l seek 20 relative-percent
# alt+l frame-step

h seek -5 relative-percent
| script-binding smart_playlist_nav/playlist-random-track
# alt+h frame-back-step

# alt+l set pause yes; frame-step
# alt+h set pause yes; frame-back-step

# Skip to the next clip
# ENTER playlist-next
] script-binding smart_playlist_nav/smart-forward
Meta+RIGHT playlist-next
n playlist-next
SPACE cycle pause
} script-binding smart_playlist_nav/playlist-next-track
alt+] script-binding next-file-dir

# Skip to the previous clip
Shift+ENTER playlist-prev
[ script-binding smart_playlist_nav/smart-back
Meta+LEFT playlist-prev
k playlist-prev
{ script-binding smart_playlist_nav/playlist-prev-track
Meta+{ playlist-play-index 0
Ctrl+H playlist-play-index 0
alt+[ script-binding prev-file-dir

# Reveal the currently playing file
Meta+r script-binding reveal_in_finder
Meta+ENTER script-binding reveal_in_finder
Meta+y script-binding reveal_in_yazi
Meta+l script-binding reveal_in_forklift

Meta+e run "/Applications/LosslessCut.app/Contents/MacOS/LosslessCut" "${path}"

# Edit mpv.conf in helix (kitty). Needs macos-menu-shortcuts=no in mpv.conf.
Meta+, script-binding edit_config_in_helix

Shift+I show-text "\fs20${path}\nResolution: ${width}x${height}\nFPS: ${fps}\nCodec: ${video-codec}"
f show-text "${path}\nResolution: ${width}x${height}\nFPS: ${container-fps}\nCodec: ${video-codec}\nTags: ${metadata}\nFilesize: ${file-size}" 3000
Meta+i script-message toggle_full_metadata_popup
i script-message toggle-info-panel

Ctrl+r script-binding smart_playlist_nav/playlist-random-chapter
Ctrl+s script-binding sort_playlist_by_mtime
Ctrl+d script-binding expand_playlist_dirs
Ctrl+e script-binding expand_sort_play_newest

# Smart chapter or 10% seek
Shift+LEFT add chapter -1

Shift+RIGHT add chapter 1

# Open parent dir in kitty and launch yazi
Ctrl+k script-binding open_in_kitty
Ctrl+f script-binding reveal_in_finder
Ctrl+p script-binding progress_bar_minimal/toggle-progress

\ script-binding smart_playlist_nav/smart-random-position
Shift+j script-binding smart_playlist_nav/random_playlist_jump
# rotate
r cycle-values video-rotate 0 90 180 270
# reverse rotate
R cycle-values video-rotate 0 270 180 90

Ctrl+o script-binding select/select-playlist
#o script-binding select/select-playlist
o script-binding open_panel_show
g script-message toggle-goto-panel
Meta+b script-binding select/select-binding

b script-message-to metadata toggle

# Chapter edit mode installs mode-local + / Meta+BS / Meta+Shift+BS handlers while active.
c script-binding chapter_edit_mode/toggle
e script-binding toggle-edge-fade

# Toggle fullscreen with ⌘ + F
Meta+f cycle fullscreen

TAB script-binding toggle-osd-full
ESC script-binding show-menu
p script-binding toggle-pan-scan
F7 script-binding toggle_stats
1 script-binding smart_playlist_nav/toggle_auto_jump
2 script-binding toggle_force_landscape
3 script-binding toggle-skip-intros
4 script-binding progress_bar_minimal/toggle-progress
Meta+1 script-binding smart_playlist_nav/set_delay_1
Meta+2 script-binding smart_playlist_nav/set_delay_3
Meta+3 script-binding smart_playlist_nav/set_delay_5
Meta+4 script-binding smart_playlist_nav/set_delay_10
Meta+5 script-binding smart_playlist_nav/set_delay_20
Meta+6 script-binding smart_playlist_nav/set_delay_5pct
Meta+7 script-binding smart_playlist_nav/set_delay_10pct
Meta+8 script-binding smart_playlist_nav/set_delay_15pct
Meta+9 script-binding smart_playlist_nav/jump_last_10pct

# Modal sections. Scripts enable/disable these sections; the keys live here.
+ {chapter-edit-mode} script-binding chapter_edit_mode/add
KP_ADD {chapter-edit-mode} script-binding chapter_edit_mode/add
Meta+BS {chapter-edit-mode} script-binding chapter_edit_mode/delete-nearest
Meta+DEL {chapter-edit-mode} script-binding chapter_edit_mode/delete-nearest
Meta+Shift+BS {chapter-edit-mode} script-binding chapter_edit_mode/delete-all
Meta+Shift+DEL {chapter-edit-mode} script-binding chapter_edit_mode/delete-all
ESC {chapter-edit-mode} script-binding chapter_edit_mode/exit

y {prompt} script-binding show_prompt/option-y
n {prompt} script-binding show_prompt/option-n

TAB {ab-compare} script-binding ab_compare/toggle-osd
ENTER {ab-compare} script-binding ab_compare/toggle
KP_ENTER {ab-compare} script-binding ab_compare/toggle
_ {ab-compare} script-binding ab_compare/toggle
a {ab-compare} script-binding ab_compare/toggle
1 {ab-compare} script-binding ab_compare/show-a
2 {ab-compare} script-binding ab_compare/show-b
d {ab-compare} script-binding ab_compare/diff
v {ab-compare} script-binding ab_compare/stack
t {ab-compare} script-binding ab_compare/vstack
s {ab-compare} script-binding ab_compare/split
l {ab-compare} script-binding ab_compare/cycle-layout
L {ab-compare} script-binding ab_compare/cycle-layout-back
[ {ab-compare} script-binding ab_compare/nudge-back
] {ab-compare} script-binding ab_compare/nudge-forward
{ {ab-compare} script-binding ab_compare/nudge-back-5
} {ab-compare} script-binding ab_compare/nudge-forward-5
0 {ab-compare} script-binding ab_compare/reset-offset
k {ab-compare} script-binding ab_compare/toggle-keybar
? {ab-compare} script-binding ab_compare/help
