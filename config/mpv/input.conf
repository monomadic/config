# https://github.com/mpv-player/mpv/blob/master/etc/input.conf

# Shuffle the playlist
s playlist-shuffle ; show-text "Shuffled ${playlist-count} items" 1000 1

Meta+d script-binding replace-playlist
Meta+o script-binding load-all-media
Meta+c script-binding copy-current-path

j script-binding random_seek_within_file

# Edit with losslesscut
Meta+t run /Applications/LosslessCut.app/Contents/MacOS/LosslessCut "%{path}"

# Interpolation toggle
# i cycle interpolation
# V cycle-values osd-msg3 "${path}\n${width}x${height} ${video-bitrate} ${video-codec} @ ${fps}fps\n${file-size}" ""
Ctrl+I cycle interpolation ; show-text "interpolation: ${interpolation}"
Ctrl+T cycle-values tscale oversample mitchell box ; show-text "tscale=${tscale}"

# / show-text "${metadata/title:}\n${?gt(width,height):${width}:${height}}p @ ${estimated-vf-fps}fps\n${file-size}${?video-bitrate: [${video-bitrate}]}" 5000 1

#/ show-text "${metadata/title:}\n${!add(gt(width,height),gt(height,width)):${width:0}:${height:0}}p @ ${estimated-vf-fps}fps\n${file-size}${?video-bitrate: [${video-bitrate}]}" 5000 1
# SHIFT+/ show shortcut help
SHIFT+? show-text "[?:HELP   /:INFO   R:RANDOMIZE]"

# Random clip
SHIFT+Enter script-message play-random

l seek 5 relative-percent
Shift+l seek 20 relative-percent
# alt+l frame-step

h seek -5 relative-percent
| seek -15 relative-percent
# alt+h frame-back-step

# alt+l set pause yes; frame-step
# alt+h set pause yes; frame-back-step

# Skip to the next clip
# ENTER playlist-next
] script-binding smart_playlist_nav/smart-forward
n playlist-next
SPACE cycle pause
} script-binding smart_playlist_nav/playlist-next-track
alt+] script_binding next-file-dir

# Skip to the previous clip
Shift+ENTER playlist-prev
[ script-binding smart_playlist_nav/smart-back
k playlist-prev
{ script-binding smart_playlist_nav/playlist-prev-track
alt+[ script_binding prev-file-dir

# Reveal the currently playing file in finder
Meta+r script_binding reveal_in_finder
Meta+ENTER script_binding reveal_in_finder

Meta+e run "/Applications/LosslessCut.app/Contents/MacOS/LosslessCut" "${path}"

Shift+I show-text "\fs20${path}\nResolution: ${width}x${height}\nFPS: ${fps}\nCodec: ${video-codec}"
f show-text "${path}\nResolution: ${width}x${height}\nFPS: ${container-fps}\nCodec: ${video-codec}\nTags: ${metadata}\nFilesize: ${file-size}" 3000
Meta+i script-message toggle_full_metadata_popup

Ctrl+r script-message play-random-chapter
Ctrl+s script-binding sort_playlist_by_mtime
Ctrl+d script-binding expand_playlist_dirs
Ctrl+e script-binding expand_sort_play_newest

# Smart chapter or 10% seek
Shift+LEFT add chapter -1

Shift+RIGHT add chapter 1

# Open parent dir in kitty and launch lf
Ctrl+k script_binding open_in_kitty
Ctrl+f script_binding reveal_in_finder
Ctrl+p script_binding progress-bar-minimal/toggle-progress

\ script-binding smart_playlist_nav/playlist-random-track
Shift+j script_binding random_playlist_jump
# rotate
r cycle-values video-rotate 0 90 180 270
# reverse rotate
R cycle-values video-rotate 0 270 180 90

Ctrl+o script-binding select/select-playlist
#o script-binding select/select-playlist
Meta+b script-binding select/select-binding

b script-message-to metadata toggle
e script-binding toggle-edge-fade

# Toggle fullscreen with ⌘ + F
Meta+f cycle fullscreen

TAB script-binding toggle-osd-full
ESC script-binding show-menu
p script-binding toggle-pan-scan
F7 script-binding toggle_stats
1 script_binding toggle_auto_jump
2 script_binding toggle_force_landscape
3 script-binding toggle-skip-intros
4 script_binding progress-bar-minimal/toggle-progress
Meta+1 script-binding set_delay_1
Meta+2 script-binding set_delay_3
Meta+3 script-binding set_delay_5
Meta+4 script-binding set_delay_10
Meta+5 script-binding set_delay_20
Meta+6 script-binding set_delay_5pct
Meta+7 script-binding set_delay_10pct
Meta+8 script-binding set_delay_15pct
Meta+9 script-binding jump_last_10pct
