# Global quit chord
[[mgr.prepend_keymap]]
on   = "<C-Space>"
run  = "quit"
desc = "Quit back to the shell"

[[mgr.prepend_keymap]]
on   = "<Esc>"
run  = "quit"
desc = "Quit back to the shell"

[[tasks.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close tasks and quit"

[[spot.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close spotter and quit"

[[pick.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close picker and quit"

[[input.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close input and quit"

[[confirm.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close confirm dialog and quit"

[[cmp.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "input:close", "mgr:quit" ]
desc = "Close completion and quit"

[[help.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close help and quit"

# Inputs should behave like normal prompt boxes.
[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

# Workflow upgrades
[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Open files or enter directories"

# [[mgr.prepend_keymap]]
# on   = [ "<Space>", "o" ]
# run  = "plugin smart-enter"
# desc = "Open files or enter directories"

[[mgr.prepend_keymap]]
on   = [ "<Space>" ]
for  = "macos"
run  = "shell -- /Users/nom/config/config/zsh/bin/yazi-quicklook %h"
desc = "Preview hovered file"

[[mgr.prepend_keymap]]
on   = [ "<C-r>" ]
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "\\"
run  = [ "toggle", "arrow 1" ]
desc = "Select hovered file"

[[mgr.prepend_keymap]]
on   = "<D-a>"
run  = "toggle_all --state=on"
desc = "Select all files"

[[mgr.prepend_keymap]]
on   = "<D-j>"
run  = "plugin jumpdir -- 4"
desc = "Jump to a nearby directory with fzf"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "arrow prev"
desc = "Move up"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "f", "f" ]
run  = "plugin fg -- fzf"
desc = "Find file by filename"

[[mgr.prepend_keymap]]
on   = [ "f", "g" ]
run  = "plugin fg"
desc = "Find file by content (fuzzy match)"

[[mgr.prepend_keymap]]
on   = [ "f", "G" ]
run  = "plugin fg -- rg"
desc = "Find file by content (ripgrep match)"

[[mgr.prepend_keymap]]
on   = [ "f", "R" ]
run  = "search --via=rga"
desc = "Search file contents via ripgrep-all"

[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = [ "t", "p" ]
run  = "plugin --sync pane-layout --args=toggle-parent"
desc = "Toggle parent pane"

[[mgr.prepend_keymap]]
on   = [ "t", "P" ]
run  = "plugin --sync pane-layout --args=cycle-preview"
desc = "Cycle preview pane size"

[[mgr.prepend_keymap]]
on   = "<C-1>"
run  = "plugin --sync toggle-view --args=parent"
desc = "Toggle parent pane"

[[mgr.prepend_keymap]]
on   = "<C-2>"
run  = "plugin --sync toggle-view --args=current"
desc = "Toggle current pane"

[[mgr.prepend_keymap]]
on   = "<C-3>"
run  = "plugin --sync toggle-view --args=preview"
desc = "Toggle preview pane"

# Native tab navigation
[[mgr.prepend_keymap]]
on   = "["
run  = "tab_switch -1 --relative"
desc = "Switch to previous tab"

[[mgr.prepend_keymap]]
on   = "]"
run  = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on   = "<Tab>"
run  = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on   = [ "e", "t" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --auto-hide --cwd %d1 --title " trim intro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut %s'''
desc = "Trim intro from selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "T" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --auto-hide --cwd %d1 --title " trim outro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut --reverse %s'''
desc = "Trim outro from selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "i" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 60fps " -- /Users/nom/.zsh/bin/davinci-resolve-interpolate-60fps %s'''
desc = "Interpolate selected videos to 60fps in DaVinci Resolve"

[[mgr.prepend_keymap]]
on   = [ "e", "z" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " topaz workflow " -- /Users/nom/config/config/zsh/bin/topaz-workflow %s'''
desc = "Run Topaz workflow on selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "r" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s'''
desc = "Rename selected media"

[[mgr.prepend_keymap]]
on   = [ "T", "c" ]
for  = "unix"
run  = '''shell --block -- /Users/nom/.zsh/bin/yazi-dual copy %s'''
desc = "Copy selected files to the other Yazi pane"

[[mgr.prepend_keymap]]
on   = [ "m", "t" ]
run  = "shell --block -- ffmpeg-lossless-cut %s"
desc = "Trim intros from selected movies"

[[mgr.prepend_keymap]]
on   = [ "m", "a" ]
run  = "plugin mactag add"
desc = "Add macOS tags to selected files"

[[mgr.prepend_keymap]]
on   = [ "m", "u" ]
run  = "plugin mactag remove"
desc = "Remove macOS tags from selected files"

[[mgr.prepend_keymap]]
on   = [ "m", "l" ]
run  = "linemode lsd_size_mtime"
desc = "Linemode: lsd size + mtime"

[[mgr.prepend_keymap]]
on   = [ "m", "k" ]
run  = "linemode lsd_mtime"
desc = "Linemode: lsd mtime"

[[mgr.prepend_keymap]]
on   = [ ",", "m" ]
run  = "sort mtime --reverse=no"
