# Global quit chord
[[mgr.prepend_keymap]]
on   = "<C-Space>"
run  = "quit"
desc = "Quit back to the shell"

[[mgr.prepend_keymap]]
on   = "<Esc>"
run  = "quit"
desc = "Quit back to the shell"

[[tasks.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close tasks and quit"

[[spot.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close spotter and quit"

[[pick.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close picker and quit"

[[input.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close input and quit"

[[confirm.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close confirm dialog and quit"

[[cmp.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "input:close", "mgr:quit" ]
desc = "Close completion and quit"

[[help.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close help and quit"

# Inputs should behave like normal prompt boxes.
[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

# Workflow upgrades
[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Open files or enter directories"

# ─────────────────────────────────────────────────────────────────────────
# <Space> root menu — top-level hub that funnels into sub-menus.
#   <Space><Space>  quicklook       m  media…      o  open…      e  encode/edit…
# ─────────────────────────────────────────────────────────────────────────

[[mgr.prepend_keymap]]
on   = [ "<Space>", "<Space>" ]
for  = "macos"
run  = "shell -- /Users/nom/config/config/zsh/bin/yazi-quicklook %h"
desc = "Quicklook hovered file"

# <Space> m — media
[[mgr.prepend_keymap]]
on   = [ "<Space>", "m", "r" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s'''
desc = "Media: rename selected media"

# <Space> o — open
[[mgr.prepend_keymap]]
on   = [ "<Space>", "o", "d" ]
for  = "macos"
run  = 'shell -- open "%d"'
desc = "Open: current directory in Finder"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "o", "p" ]
for  = "macos"
run  = 'shell -- open "%d/.."'
desc = "Open: parent directory in Finder"

# <Space> e — encode / edit
[[mgr.prepend_keymap]]
on   = [ "<Space>", "e", "t" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " trim intro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut %s'''
desc = "Encode: trim (start)"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "e", "T" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " trim outro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut --reverse %s'''
desc = "Encode: trim (end)"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "e", "c" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " check media " -- /Users/nom/.zsh/bin/media-check-files %s'''
desc = "Encode: media-check-files"

[[mgr.prepend_keymap]]
on   = "<C-r>"
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s'''
desc = "Rename selected media"

[[mgr.prepend_keymap]]
on   = "<D-r>"
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "<Tab>"
run  = [ "toggle", "arrow 1" ]
desc = "Select hovered file"

[[mgr.prepend_keymap]]
on   = "<D-a>"
run  = "toggle_all --state=on"
desc = "Select all files"

[[mgr.prepend_keymap]]
on   = "<D-A>"
run  = "toggle_all --state=off"
desc = "Deselect all files"

[[mgr.prepend_keymap]]
on   = "<D-j>"
run  = "plugin jumpdir -- 4"
desc = "Jump to a nearby directory with fzf"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "seek -1"
desc = "Scroll preview up"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "f", "f" ]
run  = "plugin fg -- fzf"
desc = "Find file by filename"

[[mgr.prepend_keymap]]
on   = [ "f", "g" ]
run  = "plugin fg"
desc = "Find file by content (fuzzy match)"

[[mgr.prepend_keymap]]
on   = [ "f", "G" ]
run  = "plugin fg -- rg"
desc = "Find file by content (ripgrep match)"

[[mgr.prepend_keymap]]
on   = [ "f", "R" ]
run  = "search --via=rga"
desc = "Search file contents via ripgrep-all"

[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = [ "t", "p" ]
run  = "plugin pane-layout -- cycle-preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on   = [ "t", "s" ]
run  = "plugin pane-layout -- toggle-parent"
desc = "Toggle sidebar"

[[mgr.prepend_keymap]]
on   = "<C-1>"
run  = "plugin pane-layout -- preset default"
desc = "View: parent on, preview small"

[[mgr.prepend_keymap]]
on   = "<C-2>"
run  = "plugin pane-layout -- preset preview"
desc = "View: parent off, 50/50 files/preview"

[[mgr.prepend_keymap]]
on   = "<C-3>"
run  = "plugin pane-layout -- preset minimal"
desc = "View: parent off, preview off"

# Native tab navigation
[[mgr.prepend_keymap]]
on   = "["
run  = "tab_switch -1 --relative"
desc = "Switch to previous tab"

[[mgr.prepend_keymap]]
on   = "]"
run  = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on   = "<Tab>"
run  = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on   = [ "T" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title "trim intro" -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut %s'''
desc = "Trim intro from selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "T" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " trim outro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut --reverse %s'''
desc = "Trim outro from selected videos"

[[mgr.prepend_keymap]]
on   = "<C-t>"
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " trim intro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut %s'''
desc = "Trim intro from selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "i" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 60fps " -- /Users/nom/.zsh/bin/interpolate-resolve %s'''
desc = "Interpolate selected videos to 60fps in DaVinci Resolve"

[[mgr.prepend_keymap]]
on   = [ "e", "I" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 120fps " -- /Users/nom/.zsh/bin/interpolate-resolve 120 %s'''
desc = "Interpolate selected videos to 120fps in DaVinci Resolve"

[[mgr.prepend_keymap]]
on   = [ "e", "z" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " topaz workflow " -- /Users/nom/config/config/zsh/bin/topaz-workflow %s'''
desc = "Run Topaz workflow on selected videos"

[[mgr.prepend_keymap]]
on   = [ "e", "r" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s'''
desc = "Rename selected media"

[[mgr.prepend_keymap]]
on   = [ "e", "f" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " rename footage " -- /Users/nom/.zsh/bin/rename-footage %s'''
desc = "Rename selected footage"

[[mgr.prepend_keymap]]
on   = [ "e", "s" ]
for  = "unix"
run  = '''shell --orphan -- /Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " set rating " -- /Users/nom/.zsh/bin/media-set-rating %s'''
desc = "Set star rating on selected media"

[[mgr.prepend_keymap]]
on   = [ "e", "]" ]
run  = "shell --block -- /Users/nom/.zsh/bin/video-rotate-lossless --right %s"
desc = "Rotate selected videos right (lossless)"

[[mgr.prepend_keymap]]
on   = [ "e", "[" ]
run  = "shell --block -- /Users/nom/.zsh/bin/video-rotate-lossless --left %s"
desc = "Rotate selected videos left (lossless)"

[[mgr.prepend_keymap]]
on   = [ "e", "c" ]
for  = "unix"
run  = '''shell --block -- /Users/nom/.zsh/bin/yazi-dual copy %s'''
desc = "Copy selected files to the other pane's cwd"

[[mgr.prepend_keymap]]
on   = [ "e", "m" ]
for  = "unix"
run  = '''shell --block -- /Users/nom/.zsh/bin/yazi-dual move %s'''
desc = "Move selected files to the other pane's cwd"

[[mgr.prepend_keymap]]
on   = [ "m", "t" ]
run  = "shell --block -- ffmpeg-lossless-cut %s"
desc = "Trim intros from selected movies"

[[mgr.prepend_keymap]]
on   = [ "m", "l" ]
run  = "linemode lsd_size_mtime"
desc = "Linemode: lsd size + mtime"

[[mgr.prepend_keymap]]
on   = [ "m", "k" ]
run  = "linemode lsd_mtime"
desc = "Linemode: lsd mtime"

[[mgr.prepend_keymap]]
on   = [ ",", "m" ]
run  = "sort mtime --reverse=no"
desc = "Sort by modified time"

[[mgr.prepend_keymap]]
on   = [ ",", "M" ]
run  = "sort mtime --reverse=yes"
desc = "Sort by modified time reverse"

[[mgr.prepend_keymap]]
on   = [ ",", "b" ]
run  = "sort btime --reverse=no"
desc = "Sort by birth time"

[[mgr.prepend_keymap]]
on   = [ ",", "B" ]
run  = "sort btime --reverse=yes"
desc = "Sort by birth time reverse"

[[mgr.prepend_keymap]]
on   = [ ",", "s" ]
run  = "sort size --reverse=no"
desc = "Sort by size"

[[mgr.prepend_keymap]]
on   = [ ",", "S" ]
run  = "sort size --reverse=yes"
desc = "Sort by size reverse"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = "cd --interactive"
desc = "Goto menu"

[[mgr.prepend_keymap]]
on   = [ "g", "n" ]
run  = "plugin first-non-directory"
desc = "Jump to the first non-directory entry"

[[mgr.prepend_keymap]]
on   = [ "g", "T" ]
run  = "cd /Volumes/Tower/Movies"
desc = "Go to Tower"

[[mgr.prepend_keymap]]
on   = [ "g", "v" ]
run  = "cd /Volumes"
desc = "Go to Volumes"

[[mgr.prepend_keymap]]
on   = "<A-c>"
run  = "cd --interactive"
desc = "Change directory interactively"

[[mgr.prepend_keymap]]
on   = "r"
run  = "shell --block -- /Users/nom/.bin/bulk-rename %s"
desc = "Bulk rename selected files (editor + confirm dialog)"

[[mgr.prepend_keymap]]
on   = "R"
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "<C-n>"
run  = "seek 1"
desc = "Scroll preview down"

[[mgr.prepend_keymap]]
on   = "J"
run  = "arrow next"
desc = "Move down with wraparound"

[[mgr.prepend_keymap]]
on   = "K"
run  = "arrow prev"
desc = "Move up with wraparound"
