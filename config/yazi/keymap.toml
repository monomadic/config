# Global quit chord
[[mgr.prepend_keymap]]
on   = "<C-Space>"
run  = "quit"
desc = "Quit back to the shell"

[[mgr.prepend_keymap]]
on   = "<Esc>"
run  = "quit"
desc = "Quit back to the shell"

[[tasks.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close tasks and quit"

[[spot.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close spotter and quit"

[[pick.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close picker and quit"

[[input.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close input and quit"

[[confirm.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close confirm dialog and quit"

[[cmp.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "input:close", "mgr:quit" ]
desc = "Close completion and quit"

[[help.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close help and quit"

# Inputs should behave like normal prompt boxes.
[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

# Workflow upgrades
[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Open files or enter directories"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "o" ]
run  = "plugin smart-enter"
desc = "Open files or enter directories"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "p" ]
for  = "macos"
run  = "shell --block -- /usr/bin/qlmanage -p %h"
desc = "Preview hovered file with Quick Look"

[[mgr.prepend_keymap]]
on   = [ "<Space>", "r" ]
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "<D-a>"
run  = "toggle_all --state=on"
desc = "Select all files"

[[mgr.prepend_keymap]]
on   = "<D-j>"
run  = "plugin jumpdir -- 4"
desc = "Jump to a nearby directory with fzf"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "arrow prev"
desc = "Move up"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "f", "f" ]
run  = "plugin fg -- fzf"
desc = "Find file by filename"

[[mgr.prepend_keymap]]
on   = [ "f", "g" ]
run  = "plugin fg"
desc = "Find file by content (fuzzy match)"

[[mgr.prepend_keymap]]
on   = [ "f", "G" ]
run  = "plugin fg -- rg"
desc = "Find file by content (ripgrep match)"

[[mgr.prepend_keymap]]
on   = [ "f", "R" ]
run  = "search --via=rga"
desc = "Search file contents via ripgrep-all"

[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

# Dual-pane navigation
[[mgr.prepend_keymap]]
on   = [ "b", "t" ]
run  = "plugin --sync dual-pane --args=toggle"
desc = "Dual-pane: toggle"

[[mgr.prepend_keymap]]
on   = [ "b", "b" ]
run  = "plugin --sync dual-pane --args=toggle_zoom"
desc = "Dual-pane: toggle zoom"

[[mgr.prepend_keymap]]
on   = "<Tab>"
run  = "plugin --sync dual-pane --args=next_pane"
desc = "Dual-pane: switch to the other pane"

[[mgr.prepend_keymap]]
on   = "<C-1>"
run  = "plugin --sync toggle-view --args=parent"
desc = "Toggle parent pane"

[[mgr.prepend_keymap]]
on   = "<C-2>"
run  = "plugin --sync toggle-view --args=current"
desc = "Toggle current pane"

[[mgr.prepend_keymap]]
on   = "<C-3>"
run  = "plugin --sync toggle-view --args=preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on   = "["
run  = "plugin --sync dual-pane --args='tab_switch -1 --relative'"
desc = "Dual-pane: switch active to previous tab"

[[mgr.prepend_keymap]]
on   = "]"
run  = "plugin --sync dual-pane --args='tab_switch 1 --relative'"
desc = "Dual-pane: switch active to next tab"

[[mgr.prepend_keymap]]
on   = "<F5>"
run  = "plugin --sync dual-pane --args='copy_files --follow'"
desc = "Dual-pane: copy selected files from active to inactive pane"

[[mgr.prepend_keymap]]
on   = "<F6>"
run  = "plugin --sync dual-pane --args='move_files --follow'"
desc = "Dual-pane: move selected files from active to inactive pane"

[[mgr.prepend_keymap]]
on   = [ "b", "s" ]
run  = "plugin --sync dual-pane --args=save_config"
desc = "Dual-pane: save current configuration"

[[mgr.prepend_keymap]]
on   = [ "b", "l" ]
run  = "plugin --sync dual-pane --args=load_config"
desc = "Dual-pane: load saved configuration"

[[mgr.prepend_keymap]]
on   = [ "b", "r" ]
run  = "plugin --sync dual-pane --args=reset_config"
desc = "Dual-pane: reset saved configuration"

[[mgr.prepend_keymap]]
on   = [ "m", "t" ]
run  = "shell --block -- ffmpeg-lossless-cut-by-fzf-keyframe-select %s"
desc = "Trim intros from selected movies"

[[mgr.prepend_keymap]]
on   = [ "m", "a" ]
run  = "plugin mactag add"
desc = "Add macOS tags to selected files"

[[mgr.prepend_keymap]]
on   = [ "m", "u" ]
run  = "plugin mactag remove"
desc = "Remove macOS tags from selected files"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "d" ]
run  = "plugin ffmpeg-stats -- toggle-duration"
desc = "Toggle media duration"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "r" ]
run  = "plugin ffmpeg-stats -- toggle-resolution"
desc = "Toggle media resolution"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "c" ]
run  = "plugin ffmpeg-stats -- toggle-codec"
desc = "Toggle media codec"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "f" ]
run  = "plugin ffmpeg-stats -- toggle-fps"
desc = "Toggle media FPS"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "b" ]
run  = "plugin ffmpeg-stats -- toggle-bitrate"
desc = "Toggle media bitrate"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "a" ]
run  = "plugin ffmpeg-stats -- toggle-audio-codec"
desc = "Toggle media audio codec"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "h" ]
run  = "plugin ffmpeg-stats -- toggle-audio-channels"
desc = "Toggle media audio channels"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "o" ]
run  = "plugin ffmpeg-stats -- toggle-format"
desc = "Toggle media format"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "s" ]
run  = "plugin ffmpeg-stats -- toggle-aspect"
desc = "Toggle media aspect ratio"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "A" ]
run  = "plugin ffmpeg-stats -- toggle-all"
desc = "Toggle all media stats"

[[mgr.prepend_keymap]]
on   = [ "m", "f", "D" ]
run  = "plugin ffmpeg-stats -- disable-all"
desc = "Disable all media stats"

[[mgr.prepend_keymap]]
on   = [ "g", "n" ]
run  = "plugin first-non-directory"
desc = "Jump to the first non-directory entry"

[[mgr.prepend_keymap]]
on   = "<A-c>"
run  = "cd --interactive"
desc = "Change directory interactively"

[[mgr.prepend_keymap]]
on   = "R"
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "<C-n>"
run  = "arrow next"
desc = "Move down"

[[mgr.prepend_keymap]]
on   = "J"
run  = "arrow next"
desc = "Move down with wraparound"

[[mgr.prepend_keymap]]
on   = "K"
run  = "arrow prev"
desc = "Move up with wraparound"
