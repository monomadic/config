[[mgr.prepend_keymap]]
on   = [ "g", "n" ]
run  = "plugin first-non-directory"
desc = "Jump to the first non-directory entry"

[[mgr.prepend_keymap]]
on   = [ "g", "T" ]
run  = "cd /Volumes/Tower/Movies"
desc = "Go to Tower"

[[mgr.prepend_keymap]]
on   = "<A-c>"
run  = "cd --interactive"
desc = "Change directory interactively"

[[mgr.prepend_keymap]]
on   = "r"
run  = "bulk_rename"
desc = "Bulk rename selected files with Helix"

[[mgr.prepend_keymap]]
on   = "R"
for  = "macos"
run  = "shell --orphan -- /usr/bin/open -R %h"
desc = "Reveal hovered file in Finder"

[[mgr.prepend_keymap]]
on   = "<C-n>"
run  = "arrow next"
desc = "Move down"

[[mgr.prepend_keymap]]
on   = "J"
run  = "arrow next"
desc = "Move down with wraparound"

[[mgr.prepend_keymap]]
on   = "K"
run  = "arrow prev"
desc = "Move up with wraparound"
