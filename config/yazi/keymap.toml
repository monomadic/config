"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

# Global quit chord
[[mgr.prepend_keymap]]
on   = "<C-Space>"
run  = "quit"
desc = "Quit back to the shell"

[[tasks.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close tasks and quit"

[[spot.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close spotter and quit"

[[pick.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close picker and quit"

[[input.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close input and quit"

[[confirm.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close confirm dialog and quit"

[[cmp.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "input:close", "mgr:quit" ]
desc = "Close completion and quit"

[[help.prepend_keymap]]
on   = "<C-Space>"
run  = [ "close", "mgr:quit" ]
desc = "Close help and quit"

# Inputs should behave like normal prompt boxes.
[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

# Workflow upgrades
[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Open files or enter directories"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = 'shell -- qlmanage -p "$@"'
desc = "Preview with macOS Quick Look"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "f", "f" ]
run  = "plugin fg -- fzf"
desc = "Find file by filename"

[[mgr.prepend_keymap]]
on   = [ "f", "g" ]
run  = "plugin fg"
desc = "Find file by content (fuzzy match)"

[[mgr.prepend_keymap]]
on   = [ "f", "G" ]
run  = "plugin fg -- rg"
desc = "Find file by content (ripgrep match)"

[[mgr.prepend_keymap]]
on   = [ "f", "R" ]
run  = "search --via=rga"
desc = "Search file contents via ripgrep-all"

[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = [ "g", "n" ]
run  = "plugin first-non-directory"
desc = "Jump to the first non-directory entry"

[[mgr.prepend_keymap]]
on   = "<A-c>"
run  = "cd --interactive"
desc = "Change directory interactively"

[[mgr.prepend_keymap]]
on   = "R"
run  = "open --reveal"
desc = "Reveal selected files in Finder"

[[mgr.prepend_keymap]]
on   = "J"
run  = "arrow next"
desc = "Move down with wraparound"

[[mgr.prepend_keymap]]
on   = "K"
run  = "arrow prev"
desc = "Move up with wraparound"
