[mgr]
ratio     = [ 1, 4, 3 ]
scrolloff = 5
linemode  = "lsd_size_mtime"

[preview]
max_width  = 1200
max_height = 900

[opener]
edit = [
	{ run = "${EDITOR:-vi} %s", desc = "􁹛  edit", for = "unix", block = true },
	{ run = "hx %s", desc = "􀤘  hx", for = "unix", block = true },
	{ run = "code %s", desc = "Code", for = "windows", orphan = true },
]
bulk-rename = [
	{ run = "hx %s", desc = "􀤘 Helix", for = "unix", block = true },
]
play = [
	{ run = "mpv --force-window --fullscreen --no-native-fs %s", desc = "􀾭  MPV", for = "unix", orphan = true },
	{ run = "vlc %s .", desc = "􀵨  VLC", for = "unix", orphan = true },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", desc = "􀅴  MediaInfo", for = "unix", block = true },
]
play_dir = [
	{ run = "mpv --force-window --fullscreen --no-native-fs %s", desc = "􀾭  MPV", for = "unix", orphan = true },
	{ run = "vlc %s .", desc = "􀵨  VLC", for = "unix", orphan = true },
]
open = [
	{ run = "xdg-open %s1", desc = "Open", for = "linux" },
	{ run = "open %s", desc = "􀭅 Open", for = "macos" },
	{ run = "/Users/nom/.zsh/bin/yazi-shortcut-open %s", desc = "􂅛 Run Shortcut", for = "macos", block = true },
	{ run = 'start "" %s1', desc = "Open", for = "windows", orphan = true },
]
reveal = [
	{ run = "xdg-open %d1", desc = "Reveal", for = "linux" },
	{ run = "open -R %s1", desc = "􀥯 Reveal", for = "macos" },
	{ run = "explorer /select,%s1", desc = "Reveal", for = "windows", orphan = true },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "􂷐  Show EXIF", for = "unix", block = true },
]
chordpro = [
	{ run = "chordpro-tui %s1", desc = "ChordPro TUI", for = "unix", block = true },
]
pdf_chordpro = [
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " pdf to chordpro " -- zsh -lc '/Users/nom/config/config/zsh/bin/yazi-pdf-action chordpro "$@"; printf "\nPress enter to close "; read -r _' zsh %s''', desc = "PDF to ChordPro", for = "unix", orphan = true },
]
video_tools = [
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " trim intro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut %s''', desc = "Trim intro", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " trim outro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut --reverse %s''', desc = "Trim outro", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s''', desc = "Rename media", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " topaz workflow " -- /Users/nom/.zsh/bin/topaz-workflow %s''', desc = "Topaz workflow", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " topaz presets " -- /Users/nom/.zsh/bin/topaz-simple-presets %s''', desc = "Topaz presets", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 60fps " -- /Users/nom/.zsh/bin/davinci-resolve-interpolate-60fps %s''', desc = "Resolve 60fps HEVC", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 60fps prores " -- /Users/nom/.zsh/bin/davinci-resolve-interpolate-60fps --prores %s''', desc = "Resolve 60fps ProRes", for = "unix", orphan = true },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]

[open]
prepend_rules = [
	{ url = "bulk-rename.txt", use = "bulk-rename" },
	{ url = "*.cho", use = [ "chordpro", "edit", "open", "reveal" ] },
	{ url = "*.chopro", use = [ "chordpro", "edit", "open", "reveal" ] },
	{ url = "*.chordpro", use = [ "chordpro", "edit", "open", "reveal" ] },
	{ mime = "application/pdf", use = [ "open", "reveal", "pdf_chordpro" ] },
	{ mime = "video/*", use = [ "play", "open", "reveal", "video_tools" ] },
	{ url = "*/", use = [ "edit", "open", "reveal", "play_dir" ] },
]

[plugin]
prepend_previewers = [
	{ url = "*.cho", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
	{ url = "*.chopro", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
	{ url = "*.chordpro", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
	{ url = "*.mov", run = "video-thumb-info" },
	{ url = "*.MOV", run = "video-thumb-info" },
	{ mime = "video/*", run = "video-thumb-info" },
]
append_previewers = [
	{ url = "*", run = "file-extra-metadata" },
]
append_spotters = [
	{ url = "*", run = "file-extra-metadata" },
]

[[plugin.prepend_fetchers]]
id    = "mactag"
group = "mactag"
url   = "*"
run   = "mactag"

[[plugin.prepend_fetchers]]
id    = "mactag"
group = "mactag"
url   = "*/"
run   = "mactag"

[[plugin.prepend_fetchers]]
id    = "ffmpeg_stats"
group = "ffmpeg_stats"
url   = "*"
run   = "ffmpeg-stats"
