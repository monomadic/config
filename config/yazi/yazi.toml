[mgr]
ratio     = [ 1, 4, 3 ]
scrolloff = 5

[preview]
max_width  = 1200
max_height = 900

[opener]
edit = [
	{ run = "${EDITOR:-vi} %s", desc = "$EDITOR", for = "unix", block = true },
	{ run = "hx %s", desc = "helix", for = "unix", block = true },
	{ run = "code %s", desc = "code", for = "windows", orphan = true },
	{ run = "code -w %s", desc = "code (block)", for = "windows", block = true },
]
play = [
	{ run = "mpv --force-window %s", desc = "MPV", for = "unix", orphan = true },
	{ run = "vlc %s .", desc = "VLC", for = "unix", orphan = true },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", desc = "Info", for = "unix", block = true },
]
play_dir = [
	{ run = "mpv --force-window %s", desc = "mpv", for = "unix", orphan = true },
	{ run = "vlc %s .", desc = "vlc", for = "unix", orphan = true },
]
open = [
	{ run = "xdg-open %s1", desc = "Open", for = "linux" },
	{ run = "open %s", desc = "Open", for = "macos" },
	{ run = 'start "" %s1', desc = "Open", for = "windows", orphan = true },
]
reveal = [
	{ run = "xdg-open %d1", desc = "Reveal", for = "linux" },
	{ run = "open -R %s1", desc = "Reveal", for = "macos" },
	{ run = "explorer /select,%s1", desc = "Reveal", for = "windows", orphan = true },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
pdf_chordpro = [
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --cwd %d1 --title " pdf to chordpro " -- zsh -lc '/Users/nom/config/config/zsh/bin/yazi-pdf-action chordpro "$@"; printf "\nPress enter to close "; read -r _' zsh %s''', desc = "PDF to ChordPro", for = "unix", orphan = true },
]
video_tools = [
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " trim intro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut-by-fzf-keyframe-select %s''', desc = "Trim intro", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " trim outro " -- /Users/nom/.zsh/bin/ffmpeg-lossless-cut-by-fzf-keyframe-select --reverse %s''', desc = "Trim outro", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " rename media " -- /Users/nom/.zsh/bin/rename-media %s''', desc = "Rename media", for = "unix", orphan = true },
	{ run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " topaz presets " -- /Users/nom/.zsh/bin/topaz-simple-presets %s''', desc = "Topaz presets", for = "unix", orphan = true },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]

[open]
prepend_rules = [
	{ mime = "application/pdf", use = [ "open", "reveal", "pdf_chordpro" ] },
	{ mime = "video/*", use = [ "play", "open", "reveal", "video_tools" ] },
	{ url = "*/", use = [ "edit", "open", "reveal", "play_dir" ] },
]

[plugin]
append_previewers = [
	{ url = "*", run = "file-extra-metadata" },
]
append_spotters = [
	{ url = "*", run = "file-extra-metadata" },
]

[[plugin.prepend_fetchers]]
id    = "mactag"
group = "mactag"
url   = "*"
run   = "mactag"

[[plugin.prepend_fetchers]]
id    = "mactag"
group = "mactag"
url   = "*/"
run   = "mactag"

[[plugin.prepend_fetchers]]
id    = "ffmpeg_stats"
group = "ffmpeg_stats"
url   = "*"
run   = "ffmpeg-stats"
