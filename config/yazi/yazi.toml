  { run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 120fps " -- /Users/nom/.zsh/bin/interpolate-resolve 120 %s''', desc = "¶Ć▓│  interpolate: 120fps (hevc)", for = "unix", orphan = true },
  { run = '''/Users/nom/.zsh/bin/kitty-launch --window --hold --cwd %d1 --title " resolve 120fps prores " -- /Users/nom/.zsh/bin/interpolate-resolve --prores 120 %s''', desc = "¶Ć▓│  interpolate: 120fps (prores)", for = "unix", orphan = true },
]
extract = [
  { run = "ya pub extract --list %s", desc = "¶āĆ®  extract" },
]

[open]
prepend_rules = [
  { url = "bulk-rename.txt", use = "bulk-rename" },
  { url = "*.pro", use = ["chordpro", "edit", "open", "reveal"] },
  { url = "*.cho", use = ["chordpro", "edit", "open", "reveal"] },
  { url = "*.chopro", use = ["chordpro", "edit", "open", "reveal"] },
  { url = "*.chordpro", use = ["chordpro", "edit", "open", "reveal"] },
  { mime = "application/pdf", use = ["open", "reveal", "pdf_chordpro"] },
  { mime = "video/*", use = ["play", "open", "reveal", "video_tools"] },
  { url = "*/", use = ["edit", "reveal", "play_dir", "open"] },
]

[plugin]
# iCloud eviction guard: evicted files become hidden `.Name.ext.icloud` stubs.
# Never preview/preload/spot them so Yazi never touches (and never materializes)
# an evicted file while browsing. Must precede the catch-all rules below.
prepend_preloaders = [
  { url = "*.icloud", run = "noop" },
  { url = ".*.icloud", run = "noop" },
  # Don't decode video thumbnails ahead of the cursor. The built-in `video`
  # preloader fires on every file in view ŌĆö brutal on large 4K/HEVC dirs.
  # The video-thumb-info previewer self-generates its thumbnail on hover, so
  # nothing is lost; previews just render when you land on a file.
  { mime = "video/*", run = "noop" },
]
prepend_spotters = [
  { url = "*.icloud", run = "noop" },
  { url = ".*.icloud", run = "noop" },
]
prepend_previewers = [
  { url = "*.icloud", run = "noop" },
  { url = ".*.icloud", run = "noop" },
  { url = "*.pro", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
  { url = "*.cho", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
  { url = "*.chopro", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
  { url = "*.chordpro", run = 'piper -- CHORDPRO_TUI_FORCE_COLOR=1 chordpro-tui -print -width "$w" -height "$h" "$1"' },
  # mime-ext deliberately avoids file(1), so XML and unknown/extensionless
  # files miss Yazi's default text/* preview rule. Render them as code only
  # when hovered; this adds no preloading or background MIME probing.
  { mime = "application/{xml,xml-dtd,sql,octet-stream}", run = "code" },
  { url = "*.mov", run = "video-thumb-info" },
  { url = "*.MOV", run = "video-thumb-info" },
  { mime = "video/*", run = "video-thumb-info" },
]
append_previewers = [
  { url = "*", run = "file-extra-metadata" },
]
append_spotters = [
  { url = "*", run = "file-extra-metadata" },
]

# Resolve MIME types by file extension instead of spawning file(1) per entry.
# Much faster on large media dirs; no fallback, so unknown/extensionless files
# get application/octet-stream. `group = "mime"` overrides the builtin fetcher
# (Yazi > v26.1.22 ŌĆö no `id` needed).
[[plugin.prepend_fetchers]]
url = "local://*"
run = "mime-ext.local"
prio = "high"
group = "mime"

[[plugin.prepend_fetchers]]
url = "remote://*"
run = "mime-ext.remote"
prio = "high"
group = "mime"
