# ============================================================
# Yazi theme: neon-dark
# Minimal dark base with restrained neon accents.
# Use this as a clean starting point and extend from here.
# ============================================================

# Code-preview syntax highlighting. The "neon" flavor is a local flavor with an
# empty flavor.toml (no UI colors), so only its tmtheme.xml applies here вАФ the
# UI below stays fully in control.
[flavor]
dark = "neon"


[mgr]
cwd = { fg = "#ffd75f", bold = false }
border_symbol = " "
border_style = { fg = "#FaFaFb" }

find_position = { fg = "#ff7ad9", bold = false }
find_keyword  = { fg = "#ffe66d", bold = false }

# ------------------------------------------------------------
# Selection / cursor indicators
# ------------------------------------------------------------

[indicator]
parent        = { fg = "#77FFBB", bg = "#000055" }
current       = { fg = "#77FFBB", bg = "#000033" }
preview       = { underline = false, fg = "#77FFBB", bg="#000055" }
hovered       = { bg = "#FF1519" }

# ------------------------------------------------------------
# Tabs
# ------------------------------------------------------------

[tabs]
active   = { fg = "#0a0a0b", bg = "#88BBFF", bold = false }
inactive = { fg = "#8b8f98", bg = "#000044" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# ------------------------------------------------------------
# Mode
# ------------------------------------------------------------

[mode]
normal_main = { fg = "#0a0a0b", bg = "#88FF33", bold = false }
normal_alt  = { fg = "#cfd3dc", bg = "#111114" }

select_main = { fg = "#0a0a0b", bg = "#ff7ad9", bold = false }
select_alt  = { fg = "#cfd3dc", bg = "#111114" }

unset_main  = { fg = "#0a0a0b", bg = "#ffe66d", bold = false }
unset_alt   = { fg = "#cfd3dc", bg = "#111114" }

# ------------------------------------------------------------
# Status bar
# ------------------------------------------------------------

[status]
overall   = { fg = "#cfd3dc", bg = "#0a0a0b" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type = { fg = "#66e2ff" }
perm_read = { fg = "#b8ff6a" }
perm_write = { fg = "#ffe66d" }
perm_exec = { fg = "#ff7ad9" }
perm_sep = { fg = "#3a3d46" }

progress_label  = { fg = "#cfd3dc", bold = false }
progress_normal = { fg = "#66e2ff", bg = "#111114" }
progress_error  = { fg = "#ff5f87", bg = "#111114" }

# ------------------------------------------------------------
# Popups / pickers
# ------------------------------------------------------------

[pick]
border = { fg = "#88AAFF" }
active   = { fg = "#AAFFFF", bold = false }
inactive = { fg = "#99AAAA" }

[input]
border = { fg = "#88AAFF" }
title    = { fg = "#66e2ff", bold = false }
value    = { fg = "#d7dbe3" }
selected = { bg = "#1a1d24" }

[cmp]
border = { fg = "#0a0a0b" }
active   = { bg = "#1a1d24", bold = false }
inactive = { fg = "#9aa0aa" }

[tasks]
border = { fg = "#0a0a0b" }
title   = { fg = "#66e2ff", bold = false }
hovered = { bg = "#151519" }

[which]
mask            = { bg = "#090909" }
cand            = { fg = "#66e2ff" }
rest            = { fg = "#6f7480" }
desc            = { fg = "#ff7ad9" }
separator       = "  вЖТ  "
separator_style = { fg = "#3a3d46" }

[help]
on      = { fg = "#66e2ff", bold = false }
run     = { fg = "#ff7ad9", bold = false }
desc    = { fg = "#cfd3dc" }
hovered = { bg = "#151519", bold = false }
footer  = { fg = "#0a0a0b", bg = "#66e2ff" }

[notify]
title_info  = { fg = "#66e2ff", bold = false }
title_warn  = { fg = "#ffe66d", bold = false }
title_error = { fg = "#ff5f87", bold = false }

# ------------------------------------------------------------
# Filetype coloring
# Keep filenames mostly neutral; accent only where useful.
# ------------------------------------------------------------

[filetype]
rules = [
  # Keep filename text neutral
  { url = "*", is = "orphan", fg = "#ff5f87" },
  { url = "*", is = "dummy",  fg = "#ff5f87" },
  { url = "*/", fg = "#f8f8f2" },
  { url = "*",  fg = "#f8f8f2" },
]

# ------------------------------------------------------------
# Icons
# Folder icons intentionally yellow; files use restrained accents.
# ------------------------------------------------------------

[icon]
