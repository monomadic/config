# ============================================================
# Yazi theme: neon-dark
# Minimal dark base with restrained neon accents.
# Use this as a clean starting point and extend from here.
# ============================================================


[mgr]
cwd = { fg = "#66e2ff", bold = true }
border_symbol = " "
border_style = { fg = "#0a0a0b" }

find_position = { fg = "#ff7ad9", bold = true }
find_keyword  = { fg = "#ffe66d", bold = true }

# ------------------------------------------------------------
# Selection / cursor indicators
# ------------------------------------------------------------

[indicator]
parent        = { fg = "#AAEEFF", bg = "#000088" }
current       = { fg = "#AAEEFF", bg = "#0000FF" }
preview       = { underline = false, fg = "#AAEEFF", bg="#000088" }
hovered       = { bg = "#151519" }

# ------------------------------------------------------------
# Tabs
# ------------------------------------------------------------

[tabs]
active   = { fg = "#0a0a0b", bg = "#66e2ff", bold = true }
inactive = { fg = "#8b8f98", bg = "#111114" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# ------------------------------------------------------------
# Mode
# ------------------------------------------------------------

[mode]
normal_main = { fg = "#0a0a0b", bg = "#66e2ff", bold = true }
normal_alt  = { fg = "#cfd3dc", bg = "#111114" }

select_main = { fg = "#0a0a0b", bg = "#ff7ad9", bold = true }
select_alt  = { fg = "#cfd3dc", bg = "#111114" }

unset_main  = { fg = "#0a0a0b", bg = "#ffe66d", bold = true }
unset_alt   = { fg = "#cfd3dc", bg = "#111114" }

# ------------------------------------------------------------
# Status bar
# ------------------------------------------------------------

[status]
overall   = { fg = "#cfd3dc", bg = "#0a0a0b" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type = { fg = "#66e2ff" }
perm_read = { fg = "#b8ff6a" }
perm_write = { fg = "#ffe66d" }
perm_exec = { fg = "#ff7ad9" }
perm_sep = { fg = "#3a3d46" }

progress_label  = { fg = "#cfd3dc", bold = true }
progress_normal = { fg = "#66e2ff", bg = "#111114" }
progress_error  = { fg = "#ff5f87", bg = "#111114" }

# ------------------------------------------------------------
# Popups / pickers
# ------------------------------------------------------------

[pick]
border = { fg = "#0a0a0b" }
active   = { fg = "#66e2ff", bold = true }
inactive = { fg = "#9aa0aa" }

[input]
border = { fg = "#0a0a0b" }
title    = { fg = "#66e2ff", bold = true }
value    = { fg = "#d7dbe3" }
selected = { bg = "#1a1d24" }

[cmp]
border = { fg = "#0a0a0b" }
active   = { bg = "#1a1d24", bold = true }
inactive = { fg = "#9aa0aa" }

[tasks]
border = { fg = "#0a0a0b" }
title   = { fg = "#66e2ff", bold = true }
hovered = { bg = "#151519" }

[which]
mask            = { bg = "#090909" }
cand            = { fg = "#66e2ff" }
rest            = { fg = "#6f7480" }
desc            = { fg = "#ff7ad9" }
separator       = "  →  "
separator_style = { fg = "#3a3d46" }

[help]
on      = { fg = "#66e2ff", bold = true }
run     = { fg = "#ff7ad9", bold = true }
desc    = { fg = "#cfd3dc" }
hovered = { bg = "#151519", bold = true }
footer  = { fg = "#0a0a0b", bg = "#66e2ff" }

[notify]
title_info  = { fg = "#66e2ff", bold = true }
title_warn  = { fg = "#ffe66d", bold = true }
title_error = { fg = "#ff5f87", bold = true }

# ------------------------------------------------------------
# Filetype coloring
# Keep filenames mostly neutral; accent only where useful.
# ------------------------------------------------------------

[filetype]
rules = [
  # Keep filename text neutral
  { url = "*", is = "orphan", fg = "#ff5f87" },
  { url = "*", is = "dummy",  fg = "#ff5f87" },
  { url = "*/", fg = "#f8f8f2" },
  { url = "*",  fg = "#f8f8f2" },
]

# ------------------------------------------------------------
# Icons
# Folder icons intentionally yellow; files use restrained accents.
# ------------------------------------------------------------

[icon]
