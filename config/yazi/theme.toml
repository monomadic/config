"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# ============================================================
# Yazi theme: neon-dark
# Minimal dark base with restrained neon accents.
# Use this as a clean starting point and extend from here.
# ============================================================


[mgr]
cwd = { fg = "#66e2ff", bold = true }
border_symbol = " "
border_style = { fg = "#0a0a0b" }

find_position = { fg = "#ff7ad9", bold = true }
find_keyword  = { fg = "#ffe66d", bold = true }

# ------------------------------------------------------------
# Selection / cursor indicators
# ------------------------------------------------------------

[indicator]
parent        = { fg = "#0f0f10", bg = "#7A86D1" }
current       = { fg = "#0f0f10", bg = "#7A86D1" }
preview       = { fg = "#ffe66d" }
hovered       = { bg = "#151519" }

# ------------------------------------------------------------
# Tabs
# ------------------------------------------------------------

[tabs]
active   = { fg = "#0a0a0b", bg = "#66e2ff", bold = true }
inactive = { fg = "#8b8f98", bg = "#111114" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# ------------------------------------------------------------
# Mode
# ------------------------------------------------------------

[mode]
normal_main = { fg = "#0a0a0b", bg = "#66e2ff", bold = true }
normal_alt  = { fg = "#cfd3dc", bg = "#111114" }

select_main = { fg = "#0a0a0b", bg = "#ff7ad9", bold = true }
select_alt  = { fg = "#cfd3dc", bg = "#111114" }

unset_main  = { fg = "#0a0a0b", bg = "#ffe66d", bold = true }
unset_alt   = { fg = "#cfd3dc", bg = "#111114" }

# ------------------------------------------------------------
# Status bar
# ------------------------------------------------------------

[status]
overall   = { fg = "#cfd3dc", bg = "#0a0a0b" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type = { fg = "#66e2ff" }
perm_read = { fg = "#b8ff6a" }
perm_write = { fg = "#ffe66d" }
perm_exec = { fg = "#ff7ad9" }
perm_sep = { fg = "#3a3d46" }

progress_label  = { fg = "#cfd3dc", bold = true }
progress_normal = { fg = "#66e2ff", bg = "#111114" }
progress_error  = { fg = "#ff5f87", bg = "#111114" }

# ------------------------------------------------------------
# Popups / pickers
# ------------------------------------------------------------

[pick]
border = { fg = "#0a0a0b" }
active   = { fg = "#66e2ff", bold = true }
inactive = { fg = "#9aa0aa" }

[input]
border = { fg = "#0a0a0b" }
title    = { fg = "#66e2ff", bold = true }
value    = { fg = "#d7dbe3" }
selected = { bg = "#1a1d24" }

[cmp]
border = { fg = "#0a0a0b" }
active   = { bg = "#1a1d24", bold = true }
inactive = { fg = "#9aa0aa" }

[tasks]
border = { fg = "#0a0a0b" }
title   = { fg = "#66e2ff", bold = true }
hovered = { bg = "#151519" }

[which]
mask            = { bg = "#090909" }
cand            = { fg = "#66e2ff" }
rest            = { fg = "#6f7480" }
desc            = { fg = "#ff7ad9" }
separator       = "  →  "
separator_style = { fg = "#3a3d46" }

[help]
on      = { fg = "#66e2ff", bold = true }
run     = { fg = "#ff7ad9", bold = true }
desc    = { fg = "#cfd3dc" }
hovered = { bg = "#151519", bold = true }
footer  = { fg = "#0a0a0b", bg = "#66e2ff" }

[notify]
title_info  = { fg = "#66e2ff", bold = true }
title_warn  = { fg = "#ffe66d", bold = true }
title_error = { fg = "#ff5f87", bold = true }

# ------------------------------------------------------------
# Filetype coloring
# Keep filenames mostly neutral; accent only where useful.
# ------------------------------------------------------------

[filetype]
rules = [
  # images
  { mime = "image/*", fg = "#c792ea" },

  # audio / video
  { mime = "audio/*", fg = "#66e2ff" },
  { mime = "video/*", fg = "#66e2ff" },

  # archives
  { mime = "application/{,g}zip", fg = "#ffb86c" },
  { mime = "application/{tar,bzip*,7z-compressed,xz,rar}", fg = "#ffb86c" },

  # documents
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#7df9aa" },

  # executables / special
  { url = "*", is = "exec",   fg = "#7df9aa" },
  { url = "*", is = "orphan", fg = "#ff5f87" },
  { url = "*", is = "dummy",  fg = "#ff5f87" },
]

# ------------------------------------------------------------
# Icons
# Folder icons intentionally yellow; files use restrained accents.
# ------------------------------------------------------------

[icon]
dirs = [
  { name = "*",         text = "", fg = "#ffd75f" },
  { name = ".git",      text = "", fg = "#ff7ad9" },
  { name = ".config",   text = "", fg = "#66e2ff" },
  { name = "Desktop",   text = "", fg = "#66e2ff" },
  { name = "Documents", text = "", fg = "#7df9aa" },
  { name = "Downloads", text = "", fg = "#66e2ff" },
  { name = "Library",   text = "", fg = "#c792ea" },
  { name = "Movies",    text = "", fg = "#66e2ff" },
  { name = "Music",     text = "", fg = "#66e2ff" },
  { name = "Pictures",  text = "", fg = "#c792ea" },
  { name = "Public",    text = "", fg = "#7df9aa" },
  { name = "Videos",    text = "", fg = "#66e2ff" },
]

exts = [
  # media
  { name = "mp4",  text = "󰈫", fg = "#66e2ff" },
  { name = "mkv",  text = "󰈫", fg = "#66e2ff" },
  { name = "mov",  text = "󰈫", fg = "#66e2ff" },
  { name = "webm", text = "󰈫", fg = "#66e2ff" },
  { name = "mp3",  text = "󰎆", fg = "#66e2ff" },
  { name = "flac", text = "󰎆", fg = "#66e2ff" },
  { name = "wav",  text = "󰎆", fg = "#66e2ff" },

  # images
  { name = "png",  text = "󰉏", fg = "#c792ea" },
  { name = "jpg",  text = "󰉏", fg = "#c792ea" },
  { name = "jpeg", text = "󰉏", fg = "#c792ea" },
  { name = "webp", text = "󰉏", fg = "#c792ea" },

  # docs
  { name = "pdf",  text = "", fg = "#7df9aa" },
  { name = "txt",  text = "󰈙", fg = "#b8bcc6" },
  { name = "md",   text = "󰍔", fg = "#b8bcc6" },

  # code / config
  { name = "rs",   text = "", fg = "#ffb86c" },
  { name = "toml", text = "󰰤", fg = "#ffe66d" },
  { name = "json", text = "󰘦", fg = "#ffe66d" },
  { name = "yaml", text = "󰈙", fg = "#ffe66d" },
  { name = "yml",  text = "󰈙", fg = "#ffe66d" },
  { name = "lua",  text = "󰢱", fg = "#66e2ff" },
  { name = "sh",   text = "󰆍", fg = "#7df9aa" },
  { name = "zsh",  text = "󰆍", fg = "#7df9aa" },
]

conds = [
  { if = "dir",    text = "", fg = "#ffd75f" },
  { if = "exec",   text = "󰆍", fg = "#7df9aa" },
  { if = "link",   text = "", fg = "#66e2ff" },
  { if = "orphan", text = "", fg = "#ff5f87" },
  { if = "block",  text = "󰜫", fg = "#ffb86c" },
  { if = "char",   text = "󰆼", fg = "#ffb86c" },
  { if = "fifo",   text = "󰟦", fg = "#c792ea" },
  { if = "sock",   text = "󰣨", fg = "#c792ea" },
  { if = "!dir",   text = "󰈔", fg = "#8f96a3" },
]
