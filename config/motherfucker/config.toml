# motherfucker — user config (~/.config/motherfucker/config.toml)
#
# Read once at startup. To apply changes, restart the agent:
#   launchctl kickstart -k gui/$UID/com.nom.motherfucker
# Every key is optional; anything missing falls back to the built-in default.
# The values below ARE the defaults, spelled out as living documentation.

# Global summon triggers: chord = mode. Multiple triggers are fine, and each
# names the mode it opens ("launcher" is the only mode so far).
# Modifiers: cmd, ctrl, opt, shift. Keys: a-z, 0-9, punctuation, space,
# enter, escape, tab, up, down, left, right, backspace.
[hotkeys]
"cmd+space" = "launcher"

# In-panel bindings: chord = action. Entries here override the defaults for
# the same chord; "none" unbinds one. Actions: open, launch-new, reveal,
# clear, dismiss, select-all, move-up, move-down.
[keys]
"enter" = "open"            # activate running app / launch installed one
#"cmd+enter" = "launch-new"  # real open (reopen event) even if running
"cmd+enter" = "reveal"          # reveal the app bundle in Finder
"cmd+r" = "reveal"          # reveal the app bundle in Finder
"ctrl+u" = "clear"
"ctrl+c" = "dismiss"
"escape" = "dismiss"
"cmd+a" = "select-all"
"up" = "move-up"
"down" = "move-down"

# Black-glass look. Colors are "#rrggbb"; opacities 0.0–1.0; sizes in points.
[style]
width = 620
panel_background = "#000000"        # wash over the glass material
panel_foreground = "#ffffff"        # search text + search icon
panel_opacity = 0.80
panel_padding = 10                  # inset from the panel edge to content
panel_corner_radius = 18
item_foreground = "#ffffff"         # non-selected row text, icons, location tag
item_font_size = 14
selected_item_background = "#FFFFFF"
selected_item_foreground = "#FFFFFF" # selected row text, icons, stat gauges
selected_item_opacity = 0.05
selected_item_corner_radius = 8
item_foreground_highlight = "#F1FF0F"          # matched query chars, normal rows
selected_item_foreground_highlight = "#F1FF0F" # matched query chars, selected row
input_font_size = 24

# Glyphs. search and the four row-state glyphs are literal strings (SF
# Symbols pasted as text work); utilities/system/applications are SF
# Symbol *names* used for the installed-row location tag.
[icons]
search = "⌕"                # magnifier in the input band
running_many = "􀢌"          # running, 2+ windows
running_one = "􀏜"           # running, one window
running_none = "􀥁"          # running, no windows
installed = "􀥃"             # installed, launchable
utilities = "wrench.and.screwdriver"
system = "gearshape"
applications = "app.badge"
shortcut = "terminal"       # SF Symbol name for the "Shortcut" tag pill

# Per-app glyph overrides: "App Name" = "glyph" (name match is
# case-insensitive; the glyph replaces the row-state glyph).
[icons.apps]
"Finder" = "􀣰 "
"Kitty" = "􀩼 "
"Signal" = "􂄹 "
"FaceTime" = "􀱰 "
"iPhone Mirroring" = "􀟞 "
"System Settings" = "􀍟 "
"Brave Browser" = "􀤆 "
"Claude" = "􂮢 "
"ChatGPT" = "􂮢 "
"VirtualDJ" = "􀢸 "

# Custom entries matched like apps; selecting one runs the command via
# `sh -c` (loaded once at startup — zero cost while typing). Only the
# outer quotes are trimmed, so inner quotes are written bare, not escaped.
[shortcuts]
#"Movies" = "open -R ~/Movies"
"Shutdown" = "osascript -e 'tell app \"System Events\" to shut down'"
"Restart" = "osascript -e 'tell app \"System Events\" to restart'"
"Restart Motherfucker" = "launchctl kickstart -k gui/$UID/com.nom.motherfucker"

[stats]
interval = 1.0              # seconds between cpu/ram refreshes while open
