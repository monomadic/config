strategy = "Two moves in one pass: scrub compression and noise hard, then lay uniform grain over the scrubbed surface. The grain unifies patches the cleanup smoothed unevenly — the classic restoration trick. gsize 2.5 matches Max + Regrain, so cleaned and upscaled clips cut together."
