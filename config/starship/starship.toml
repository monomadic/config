# ~/.config/starship.toml
add_newline = false
command_timeout = 500
#scan_timeout = 10

format = "$directory$git_branch$git_status${custom.uptime}${custom.disk_free}${custom.battery}$line_break$os$hostname $character"

# ---------- OS + Host ----------
[os]
disabled = false
format = "[$symbol]($style)"
style = "bold white"
[os.symbols]
Macos = "󰀵 "

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style="bold white"
disabled = false

[custom.folder_icon]
symbol = "􀈕 "
style = "bold green"
format = " [$symbol]($style)"
disabled = false

# ---------- Directory (absolute path) ----------
[directory]
style = "yellow"
format = "[$path]($style)"
truncation_length = 0
truncate_to_repo = false

# ---------- Git ----------
[git_branch]
symbol = " "
style = "bold green"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]($style)"
disabled = false

# ---------- Session stats ----------
[custom.uptime]
when = '[ -z "${ZELLIJ:-}" ]'
command = 'uptime | awk -F"up " "{print \$2}" | sed "s/, .*//"'
format = "  [􀐱  $output](bold #0ACAFF)"

[custom.disk_free]
when = '[ -z "${ZELLIJ:-}" ]'
command = "df -k . | tail -1 | awk '{print $4*1024}' | /opt/homebrew/opt/coreutils/libexec/gnubin/numfmt --to=iec --suffix=b --format='%.1f'"
format = "  [􀤂  $output](bold #0AAAFF)"

[custom.battery]
when = '[ -z "${ZELLIJ:-}" ] && pmset -g batt | grep -q InternalBattery'
command = "/Users/nom/config/config/zsh/bin/zellij-status-segment battery"
format = "  [$output](bold #0A7AFF) "

# ---------- Time (right) ----------
[time]
disabled = false
format = "[ $time](bold white)"
time_format = "%H:%M:%S"

# ---------- Prompt char ----------
[character]
success_symbol = "[󱞩](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"
