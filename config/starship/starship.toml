# ~/.config/starship.toml
add_newline = false
command_timeout = 500
scan_timeout = 100  # default 30ms; raised to avoid timeouts in slow dirs (iCloud, network mounts)

format = "$directory$git_branch$git_status${custom.uptime}${custom.disk_free}${custom.battery}$line_break$os$hostname $character"

# ---------- OS + Host ----------
[os]
disabled = false
format = "[$symbol]($style)"
style = "bold white"
[os.symbols]
Macos = "󰀵 "

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style="bold white"
disabled = false

[custom.folder_icon]
symbol = "􀈕 "
style = "bold green"
format = " [$symbol]($style)"
disabled = false

# ---------- Directory (absolute path) ----------
[directory]
style = "yellow"
format = "[$path]($style)"
truncation_length = 0
truncate_to_repo = false

# ---------- Git ----------
[git_branch]
symbol = " "
style = "bold green"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]($style)"
disabled = false

# ---------- Session stats ----------
[custom.uptime]
when = '[ -z "${ZELLIJ:-}" ]'
command = 'uptime | awk -F"up " "{print \$2}" | sed "s/, .*//" | sed "s/ days/d/"'
format = "  [􀐱 $output](bold #0ACAFF)"

[custom.disk_free]
when = '[ -z "${ZELLIJ:-}" ]'
# `df .` stats the CWD's filesystem; on a stale SMB/network CWD that syscall can
# wedge for seconds and block the whole prompt. Hard-cap it: if df doesn't answer
# fast the segment just goes blank instead of hanging the shell.
command = "/opt/homebrew/opt/coreutils/libexec/gnubin/timeout --signal=KILL 0.4 df -k . 2>/dev/null | tail -1 | awk '{print $4*1024}' | /opt/homebrew/opt/coreutils/libexec/gnubin/numfmt --to=iec --suffix=b --round=down"
format = "  [􀤂  $output](bold #0AAAFF)"

[custom.battery]
when = '[ -z "${ZELLIJ:-}" ] && pmset -g batt | grep -q InternalBattery'
command = "~/.zsh/bin/zellij-status-segment battery"
format = "  [$output](bold #0A7AFF) "

# ---------- Time (right) ----------
[time]
disabled = false
format = "[ $time](bold white)"
time_format = "%H:%M:%S"

# ---------- Prompt char ----------
[character]
success_symbol = "[󱞩](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"
