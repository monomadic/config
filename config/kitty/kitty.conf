kitty_mod cmd
shell /bin/zsh
shell_integration enabled
editor hx
allow_remote_control yes
listen_on unix:/tmp/kitty-$USER
env PATH=/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$HOME/.zsh/bin:$HOME/.bin:$PATH
exe_search_path +$HOME/.zsh/bin
mouse_hide_wait 0.0
confirm_os_window_close 0

# APPEARANCE
# font_family JetBrainsMono Nerd Font Mono
font_size 14
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 3.0
background_opacity 0.95
dynamic_background_opacity yes
hide_window_decorations yes
macos_traditional_fullscreen yes
macos_custom_beam_cursor yes
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_window_resizable yes
macos_show_window_title_in none
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#
url_color #0066FF
url_style curly
open_url_with default

# TAB APPEARANCE
#active_tab_background #ddddfd
active_tab_background #7A86D1
active_tab_foreground #000000
inactive_tab_foreground #7A86D1
#inactive_tab_background #030D43
inactive_tab_background #000000
#tab_bar_background #030D43
tab_bar_background #000000
#tab_bar_margin_color #030D43
tab_bar_margin_color #000000
tab_activity_symbol 󰧞
tab_bar_align left
tab_bar_edge top
tab_bar_margin_height 0
tab_bar_margin_width 10
tab_bar_min_tabs 2
tab_bar_style custom
tab_separator " "
tab_switch_strategy previous
tab_fade 0
tab_title_template " {title}{fmt.fg._FFFFFF}{sup.index}{fmt.fg.tab} "
active_tab_title_template " {title}{fmt.fg._7A86D1}{sup.index}{fmt.fg.tab} "

# COLORS
foreground #ddddfd
background #050F63
cursor #ddddfd
inactive_text_alpha 1.0
active_border_color #00ff00
inactive_border_color #050F63
bell_border_color #FF3AD0

# LAYOUT
enabled_layouts all
placement_strategy center
initial_window_width 1200
initial_window_height 800
remember_window_size yes
window_border_width 1
window_margin_width 1 1
window_padding_width 10 10
draw_minimal_borders yes

# KEYBINDINGS
# map kitty_mod+a set_tab_color #FFA500
map kitty_mod+a
map ctrl+alt+b launch --stdin-source=@last_cmd_output --stdin-add-formatting --type=overlay hx
#map cmd+, launch --location=neighbor --cwd=$HOME/config --type=tab env PATH="$PATH" sh -c 'env PATH="$PATH" kitty @ launch kitty-exec " config" "#04F273" hx .'
map cmd+, launch --type=tab --cwd=$HOME/config kitty-exec " config" "#A442F3" hx .
map cmd+2 launch --type=tab --hold --cwd=current kitty-exec " media" "#04F273" --shell "ls-media | mpv-socket --read0"
map cmd+\ launch --location=neighbor --cwd=current kitty-exec "  yazi " "#FF44CC" yazi
map cmd+r send_key f20
map cmd+d launch --type=background --cwd=current sh -lc 'open -R "$PWD"'
map kitty_mod+0 launch --type=background env PATH="$PATH" sh -c 'kitty @ set-tab-color --match title:"mpv" active_bg="#A442F3" active_fg="#050F63" inactive_fg="#A442F3" inactive_bg="#030D43" && exec ls-media --path $PWD | mpv-play'
map kitty_mod+9 launch --title="mpv:all" --type=tab env PATH="$PATH" sh -c 'env PATH="$PATH" kitty @ set-tab-color --match title:"mpv" active_bg="#A442F3" active_fg="#050F63" inactive_fg="#A442F3" && exec ls-media | mpv-select'
map ctrl+t>1 launch --type=background sh -c 'kitty @ set-tab-color --match id:$KITTY_WINDOW_ID active_bg=#FFA500'
map cmd+ctrl+, debug_config
map cmd+shift+g show_last_command_output
map ctrl+cmd+[ move_tab_backward
map ctrl+cmd+] move_tab_forward
#map ctrl+h neighboring_window left
#map ctrl+j neighboring_window down
#map ctrl+k neighboring_window up
#map ctrl+l neighboring_window right
# CMD+B send buffer to helix
map kitty_mod+b launch --type=overlay --stdin-source=@screen_scrollback hx -
# CMD+/ Search in scrollback with helix
map kitty_mod+/ launch --type=overlay --stdin-source=@screen_scrollback hx -
# CMD+Y Copy mode with vim bindings
map kitty_mod+y kitten hints --type regex --regex '\S+' --program @
#map ctrl+h send_text all \x1b[104;9u
map kitty_mod+i send_text all \x1b[105;9u
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right
map --when-focus-on cmdline:hx kitty_mod+h send_key ctrl+h
map --when-focus-on cmdline:hx kitty_mod+j send_key ctrl+j
map --when-focus-on cmdline:hx kitty_mod+k send_key ctrl+k
map --when-focus-on cmdline:hx kitty_mod+l send_key ctrl+l
# Reserve Cmd+[ / Cmd+] for Helix bufferline tabs.
map kitty_mod+[
map kitty_mod+]
map --when-focus-on cmdline:hx kitty_mod+[ send_key ctrl+[
map --when-focus-on cmdline:hx kitty_mod+] send_key ctrl+]
map kitty_mod+e open_url_with_hints
map kitty_mod+enter launch --location=split --cwd=current

# Quick bottom REPL pane: small vertical split at bottom
# Adjust height by changing the final number of rows in the second resize
# Default: ~12 rows tall
# Toggle overlay REPL (bottom popup vibe) with a kitten
# You can customize title/cmd if needed:
#   kitten $HOME/config/config/kitty/kittens/toggle_repl.py --title repl --cmd "zsh -l"
map kitty_mod+shift+enter kitten $HOME/config/config/kitty/kittens/toggle_repl.py
map kitty_mod+p launch --location=split --cwd=current sh -lc 'ls-media --path "$PWD" | mpv-play'
map kitty_mod+f5 load_config_file
map kitty_mod+f6 debug_config
map kitty_mod+left previous_tab
map kitty_mod+m combine : toggle_marker text 1 ❯ : copy_to_clipboard
#map kitty_mod+p>f kitten hints --type path --program -
#map kitty_mod+r launch --type=background --cwd=current open --reveal $PWD
map kitty_mod+right next_tab
map kitty_mod+shift+, load_config_file
map kitty_mod+shift+- set_background_opacity -0.1
map kitty_mod+shift+= set_background_opacity +0.1
map kitty_mod+shift+h neighboring_window left
map kitty_mod+shift+j neighboring_window down
map kitty_mod+shift+k neighboring_window up
map kitty_mod+shift+l neighboring_window right
map kitty_mod+shift+n new_os_window_with_cwd
map kitty_mod+shift+r set_tab_title
map kitty_mod+shift+t new_tab !neighbor
#map kitty_mod+n new_tab !neighbor
map kitty_mod+t new_tab_with_cwd !neighbor
map kitty_mod+w close_window
# map kitty_mod+| split_window -v --cwd=current
map ctrl+| launch --type=window --cwd=current -m=split:h
map ctrl+- launch --type=window --cwd=current -m=split:v
map shift+cmd+w close_os_window
map super+f toggle_fullscreen

# CUSTOM KEY TRANSLATIONS
map ctrl+enter send_text normal,application \x1b[13;5u
map shift+enter send_text normal,application \x1b[13;2u
map cmd+s send_text all \x13
map cmd+o send_text all \x1b[111;9u
map cmd+shift+o send_text all \x1b[111;10u
# Cmd+j / Cmd+l are reserved for pane navigation above.
map cmd+backspace send_text all \x15
map cmd+shift+b launch --type=tab btm
map cmd+shift+y launch --type=tab yazi

#map cmd+r combine : send_key ctrl+alt+r
# Disabled to reserve Cmd+R for Helix (sends F20)
# map cmd+r combine : send_key ctrl+alt+shift+r
map cmd+p combine : send_key ctrl+alt+p

