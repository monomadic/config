# Native macOS keyboard shortcuts (com.apple.symbolichotkeys), declaratively.
#
#   macos-shortcuts list             # bound shortcuts as TOML (stdout)
#   macos-shortcuts list --all       # every known shortcut, bound or not
#   macos-shortcuts export FILE      # save `list` output to FILE
#   macos-shortcuts import FILE      # apply a saved file (default: this one)
#   macos-shortcuts import --dry-run FILE
#
# One [keys] table maps a name (or raw numeric id) to a binding. Listing an
# entry implies enabled = true; add `enabled = false` to disable. Modifiers:
# cmd/command, opt/option/alt, ctrl/control, shift. Function keys (f1-f20) and
# arrows pick up the macOS fn modifier automatically. Only the IDs named here
# are touched on import — everything else is left alone.

[keys]
# Cmd+`  cycle windows of the frontmost app (Shift to reverse).
# Replaces the old osascript cycle-app-windows hack with the native feature.
next_window_in_app = { key = "`", mods = ["cmd"] }

# Examples — uncomment / edit to manage more:
# spotlight = { key = "space", mods = ["cmd"] }
# select_previous_input_source = { key = "f7", mods = ["ctrl", "shift"] }
# 56 = { key = "f20", mods = ["cmd"] }
