[ui]
show_top_bar = true
# grid_zoom = 1    # starting zoom level for grid view: 0, 1, or 2 (clamped)
# show_hidden = false  # show dotfiles and hidden files on startup (toggle with .)
# start_in_grid = false  # open in grid view on startup (toggle with v)

# Customize the Places pane. `entries` controls the pinned items in order;
# `show_devices` keeps or hides the auto-detected Devices section.
# Omit [places] entirely to keep the exact default sidebar.
#
# Built-in names: home, desktop, documents, downloads, pictures, music, videos, root, trash
# Entries are deduped by resolved path: the first matching path wins.
# 
[places]
show_devices = true
entries = [
  "home",
  { builtin = "downloads", icon = "" },
  "music",
  "videos",
  "root",
  { title = "icloud", path = "/Users/nom/Library/Mobile Documents/com~apple~CloudDocs", icon = "􀌋  "}
  { title = "src", path = "~/src", icon = "󰚝" },
]

# Optional pane weights for the browser body. Values are relative: in
# side-by-side layouts they control horizontal width, and when Preview stacks
# below Files they control the Files / Preview vertical split.
# Set a pane to 0 to hide it.
#
# If this table is omitted, Elio keeps the built-in responsive layout:
# - horizontal layout: Places prefers 20 cols, Files / Preview use a 54 / 46
#   split of the remaining width
# - tighter windows: Places can shrink to 18 cols before Preview stacks
# - stacked layout: Files / Preview use a 54 / 46 split of the available height
# - height-constrained windows: Preview drops out instead of stacking too early
#
# Custom layouts keep visible panes side by side whenever they can still meet
# minimum usable widths. If Preview can no longer fit horizontally but there is
# enough height, it stacks below Files using the configured Files / Preview
# weights.

# [layout.panes]
# places = 10
# files = 45
# preview = 45

# Rebind browser action keys. Each value may be a single key, a list, or [].
#
# Keys may be one-character strings, named keys, or modifier bindings.
# Supported named keys: "left", "right", "up", "down", "enter", "space",
# "tab", "backtab", "shift+tab", "backspace", "pageup", "pagedown", "home",
# "end", "f1".."f12".
# Named keys and modifiers are case-insensitive: "F2", "PageUp", "Ctrl+O".
#
# Examples: open_with = ["O", "w"], open = "ctrl+o", nav_right = "shift+right".
# For shifted letters, use uppercase characters: "O", not "shift+o".
#
# Setting a key replaces that action's full default list, not just one entry.
# Example: nav_down = "j" removes the default "down" arrow binding.
#
# Use [] to unbind an action.
# Example: nav_right = [] frees "l" and "right".
# Then open_or_enter = ["enter", "l", "right"] can use them.
#
# In chooser mode (--chooser-file), choose takes priority over normal actions
# that use the same key.
#
# Reserved bare keys: ? + = - _
# Reserved shortcuts: Ctrl+C, Ctrl+Plus/Minus
# Omit any key to keep the built-in default shown in the comment.
#
# [keys]
# nav_left             = ["h", "left"]
# nav_down             = ["j", "down"]
# nav_up               = ["k", "up"]
# nav_right            = ["l", "right"]
# quit                 = "q"
# quit_without_cd      = "Q"
# yank                 = "y"
# cut                  = "x"
# paste                = "p"
# trash                = "d"
# delete_permanently   = "D"   # Shift+D
# create               = "a"
# rename               = ["r", "F2"]
# restore_from_trash   = "r"
# copy_path            = "c"
# search_folders       = "f"
# search_files         = "ctrl+f"
# zoxide               = "z"
# shell                = "!"
# open                 = "o"
# open_with            = "O"
# open_or_enter        = "enter"
# choose               = "enter"  # confirm chooser selection
# go_to                = "g"
# toggle_selection     = "space"
# cycle_places_next    = "tab"
# cycle_places_previous = "backtab"
# go_parent            = "backspace"
# page_up              = "pageup"
# page_down            = "pagedown"
# jump_first           = "home"
# jump_last            = ["G", "end"]
# select_all           = "ctrl+a"
# history_back         = "alt+left"
# history_forward      = "alt+right"
# sort                 = "s"
# toggle_view          = "v"
# toggle_hidden        = "."
# scroll_preview_up    = ["K", "["]   # Shift+K, [
# scroll_preview_down  = ["J", "]"]   # Shift+J, ]
# scroll_preview_left  = "H"           # Shift+H
# scroll_preview_right = "L"           # Shift+L
