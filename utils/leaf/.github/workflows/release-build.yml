name: Release Build

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: leaf-macos-x86_64
            binary_path: target/x86_64-apple-darwin/release/leaf
            target: x86_64-apple-darwin
          - os: macos-14
            artifact_name: leaf-macos-arm64
            binary_path: target/aarch64-apple-darwin/release/leaf
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            artifact_name: leaf-linux-x86_64
            binary_path: target/release/leaf
            target: ""
          - os: ubuntu-22.04
            artifact_name: leaf-linux-arm64
            binary_path: target/aarch64-unknown-linux-gnu/release/leaf
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-22.04
            artifact_name: leaf-android-arm64
            binary_path: target/aarch64-linux-android/release/leaf
            target: aarch64-linux-android
          - os: windows-2022
            artifact_name: leaf-windows-x86_64.exe
            binary_path: target/release/leaf.exe
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        shell: bash
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Setup Android NDK
        if: matrix.target == 'aarch64-linux-android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Setup Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Android linker
        if: matrix.target == 'aarch64-linux-android'
        run: |
          echo "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android21-clang" >> "$GITHUB_ENV"

      - name: Configure Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release
        if: matrix.target == ''
        run: cargo build --release

      - name: Build Android release
        if: matrix.target == 'aarch64-linux-android'
        run: cargo build --release --target aarch64-linux-android

      - name: Build targeted release
        if: matrix.target != '' && matrix.target != 'aarch64-linux-android'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum leaf-* > checksums.txt

      - name: Ensure GitHub release exists
        env:
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 ||
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Publish release assets
        env:
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
